<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>學學星球 ✨ 二年級學習平台</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
:root{
  --sky:#6ECFF0;--sun:#FFD93D;--grass:#6BCB77;--coral:#FF6B6B;
  --lavender:#C3A6FF;--peach:#FFB347;--bg:#FFF9F0;--text:#2D2D2D;--muted:#8A8A8A;
  --footer-h:88px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito','Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
 
/* ── SCREEN ── */
.screen{display:none;height:100dvh;flex-direction:column;overflow:hidden}
.screen.active{display:flex}
 
/* ── TOPBAR ── */
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.06);z-index:10}
.topbar-back{width:44px;height:44px;border-radius:50%;border:none;background:#F0F0F0;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.topbar-back:active{transform:scale(.9)}
.topbar-title{font-size:17px;font-weight:800}
.topbar-stars{display:flex;align-items:center;gap:4px;background:var(--sun);padding:6px 14px;border-radius:20px;font-weight:800;font-size:15px}
 
/* ── SCROLL AREA ── */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 18px calc(var(--footer-h) + 16px)}
 
/* ── FIXED FOOTER ── */
/* 用於問題頁的固定底部操作區 */
.q-fixed-footer{
  position:fixed;
  bottom:0; left:0; right:0;
  padding:12px 18px;
  padding-bottom:calc(12px + env(safe-area-inset-bottom));
  background:#fff;
  box-shadow:0 -4px 20px rgba(0,0,0,.08);
  display:flex;flex-direction:column;gap:10px;
  z-index:20;
}
 
/* ── BTN ── */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;font-family:inherit;font-weight:800;border-radius:20px;transition:transform .12s,box-shadow .12s;user-select:none;width:100%}
.btn-lg{padding:18px;font-size:19px;border-radius:22px}
.btn-sm{padding:10px 20px;font-size:14px;border-radius:14px;width:auto}
.btn-primary{background:var(--coral);color:#fff;box-shadow:0 5px 0 #c94040}
.btn-primary:active{box-shadow:0 2px 0 #c94040;transform:translateY(3px) scale(.97)}
.btn-green{background:var(--grass);color:#fff;box-shadow:0 5px 0 #4aaa58}
.btn-green:active{box-shadow:0 2px 0 #4aaa58;transform:translateY(3px) scale(.97)}
.btn-purple{background:var(--lavender);color:#fff;box-shadow:0 5px 0 #9c78e0}
.btn-purple:active{box-shadow:0 2px 0 #9c78e0;transform:translateY(3px) scale(.97)}
.btn-ghost{background:#F0F0F0;color:var(--text);box-shadow:0 4px 0 #D0D0D0}
.btn-ghost:active{box-shadow:0 2px 0 #D0D0D0;transform:translateY(2px) scale(.97)}
.btn-disabled{background:#E0E0E0!important;color:#AAA!important;box-shadow:none!important;cursor:not-allowed;pointer-events:none}
 
/* ── PROGRESS ── */
.progress-wrap{background:#F0F0F0;border-radius:12px;height:12px;overflow:hidden;margin:8px 0}
.progress-bar{height:100%;border-radius:12px;background:linear-gradient(90deg,var(--grass),var(--sky));transition:width .5s ease}
.q-dots{display:flex;gap:5px;flex-wrap:wrap}
.q-dot{width:9px;height:9px;border-radius:50%;background:#E0E0E0;flex-shrink:0}
.q-dot.done{background:var(--grass)}.q-dot.current{background:var(--coral);transform:scale(1.3)}
 
/* ── HOME ── */
#screen-home{background:linear-gradient(170deg,#E8F7FF 0%,#FFF9F0 60%);overflow-y:auto;height:100dvh;display:none;flex-direction:column}
#screen-home.active{display:flex}
.home-hero{padding:30px 20px 10px;text-align:center}
.home-planet{font-size:80px;animation:float 3s ease-in-out infinite;display:block;margin:0 auto 10px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.home-title{font-size:32px;font-weight:900}
.home-sub{font-size:16px;color:var(--muted);margin-top:6px;font-weight:600}
.home-stars-badge{display:inline-flex;align-items:center;gap:6px;background:var(--sun);padding:8px 20px;border-radius:20px;font-weight:900;font-size:18px;margin:16px auto 0}
.home-menu{padding:20px;display:flex;flex-direction:column;gap:14px;padding-bottom:32px}
.hbc{border-radius:24px;padding:22px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;border:none;font-family:inherit;font-weight:800;font-size:19px;color:#fff;text-align:left;width:100%}
.hbc .icon{font-size:38px;flex-shrink:0}
.hbtext{display:flex;flex-direction:column}
.hbtext span:last-child{font-size:14px;font-weight:600;opacity:.85;margin-top:2px}
.hbc-1{background:linear-gradient(135deg,#FF6B6B,#FF8E53);box-shadow:0 8px 0 #c94040}
.hbc-1:active{box-shadow:0 3px 0 #c94040;transform:translateY(5px) scale(.98)}
.hbc-2{background:linear-gradient(135deg,#6ECFF0,#43A8D0);box-shadow:0 8px 0 #3088b0}
.hbc-2:active{box-shadow:0 3px 0 #3088b0;transform:translateY(5px) scale(.98)}
.hbc-3{background:linear-gradient(135deg,#C3A6FF,#9B6FEF);box-shadow:0 8px 0 #7a4fd0}
.hbc-3:active{box-shadow:0 3px 0 #7a4fd0;transform:translateY(5px) scale(.98)}
 
/* ── SUBJECT ── */
.subject-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.subject-card{border-radius:24px;padding:24px 16px;text-align:center;cursor:pointer;border:none;font-family:inherit;transition:transform .15s;box-shadow:0 8px 24px rgba(0,0,0,.1)}
.subject-card:active{transform:scale(.95)}
.subject-card .s-icon{font-size:52px;display:block;margin-bottom:10px}
.subject-card .s-name{font-size:20px;font-weight:900;color:#fff}
.subject-card .s-pub{font-size:13px;font-weight:600;color:rgba(255,255,255,.8);margin-top:4px}
.sc-chinese{background:linear-gradient(135deg,#FF6B6B,#FF9A9A);box-shadow:0 8px 0 #c94040}
.sc-locked{background:linear-gradient(135deg,#CCC,#AAA);box-shadow:0 8px 0 #888;cursor:not-allowed}
.lock-chip{display:inline-block;background:rgba(0,0,0,.15);color:#fff;font-size:12px;font-weight:700;padding:4px 10px;border-radius:10px;margin-top:6px}
 
/* ── UNITS ── */
.unit-card{border-radius:20px;padding:18px 20px;margin-bottom:14px;cursor:pointer;border:none;font-family:inherit;text-align:left;width:100%;display:flex;align-items:center;gap:16px;box-shadow:0 4px 16px rgba(0,0,0,.07);background:#fff;border-left:6px solid transparent}
.unit-card:active{transform:scale(.98)}
.uc-active{border-left-color:var(--coral)}.uc-done{border-left-color:var(--grass)}.uc-locked{opacity:.5;cursor:not-allowed}
.unit-num{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;flex-shrink:0}
.un-active{background:var(--coral)}.un-done{background:var(--grass)}.un-locked{background:#CCC}
.unit-info{flex:1}
.unit-title{font-size:17px;font-weight:800}
.unit-sub{font-size:12px;color:var(--muted);margin-top:3px}
.unit-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.badge{padding:4px 10px;border-radius:10px;font-size:12px;font-weight:700}
.badge-done{background:#D4F5DB;color:#2e7d32}
.badge-todo{background:#FFE8D6;color:#e65100}
.badge-locked{background:#EEE;color:#888}
 
/* ── Q ENGINE HEADER ── */
.qe-header{flex-shrink:0;padding:12px 18px 0;background:var(--bg)}
.qe-mode-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:12px;font-size:13px;font-weight:700;color:#fff;margin-bottom:8px}
.qe-mode-challenge{background:var(--coral)}.qe-mode-reinforce{background:var(--peach);color:#333}.qe-mode-explore{background:var(--lavender)}
.q-counter{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
 
/* ── QUESTION BODY ── */
.question-body{background:#fff;border-radius:22px;padding:24px 20px;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,.07)}
.q-stem{font-size:20px;font-weight:800;line-height:1.7;margin-bottom:16px}
.q-hint{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:12px}
 
/* ── OPTIONS ── */
.options-grid{display:flex;flex-direction:column;gap:10px}
.option-btn{border:3px solid #E8E8E8;background:#fff;border-radius:17px;padding:14px 17px;font-family:inherit;font-size:17px;font-weight:700;color:var(--text);cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;width:100%}
.option-btn:active{transform:scale(.98)}
.option-btn.correct{border-color:var(--grass);background:#EDFBF0}
.option-btn.wrong{border-color:var(--coral);background:#FFF0F0}
.opt-letter{width:32px;height:32px;border-radius:50%;background:#F0F0F0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0}
.option-btn.correct .opt-letter{background:var(--grass);color:#fff}
.option-btn.wrong .opt-letter{background:var(--coral);color:#fff}
 
/* ── TEXT INPUT ── */
.input-tip{display:inline-flex;align-items:center;gap:6px;background:#F0F8FF;border:1.5px solid #B8E4F9;border-radius:10px;padding:5px 11px;font-size:12px;font-weight:700;color:#2a7da0;margin-bottom:10px}
.ti-single{width:100%;border:3px solid #E0E0E0;border-radius:17px;padding:16px 18px;font-family:inherit;font-size:26px;font-weight:800;color:var(--text);outline:none;text-align:center;letter-spacing:4px;transition:border-color .2s;background:#FAFAFA}
.ti-single:focus{border-color:var(--sky);background:#fff}
.ti-single.correct{border-color:var(--grass);background:#EDFBF0}
.ti-single.wrong{border-color:var(--coral);background:#FFF0F0}
.ti-sentence{width:100%;border:3px solid #E0E0E0;border-radius:17px;padding:16px 18px;font-family:inherit;font-size:19px;font-weight:700;color:var(--text);outline:none;transition:border-color .2s;background:#FAFAFA;resize:none;line-height:1.7}
.ti-sentence:focus{border-color:var(--sky);background:#fff}
.ti-sentence.correct{border-color:var(--grass);background:#EDFBF0}
.ti-sentence.wrong{border-color:var(--coral);background:#FFF0F0}
 
/* ── CHIPS / REORDER ── */
.chip-pool{display:flex;flex-wrap:wrap;gap:9px;margin:10px 0}
.chip{padding:9px 15px;border-radius:13px;font-size:16px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:transform .1s,opacity .1s}
.chip:active{transform:scale(.93)}
.chip-src{background:#EEE;color:var(--text)}
.chip-src.used{opacity:.25;pointer-events:none}
.chip-sel{background:var(--sky);color:#fff}
.answer-area{min-height:50px;border:3px dashed #D0D0D0;border-radius:15px;padding:10px 13px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;background:#FAFAFA;margin:10px 0}
 
/* ── MATCHING ── */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.match-col-title{font-size:13px;font-weight:800;color:var(--muted);margin-bottom:8px;text-align:center}
.match-item{border:3px solid #E8E8E8;background:#fff;border-radius:13px;padding:11px 8px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;text-align:center;width:100%;min-height:52px;display:flex;align-items:center;justify-content:center;line-height:1.4}
.match-item.selected{border-color:var(--sky);background:#EDF7FF}
.match-item.matched-ok{border-color:var(--grass);background:#EDFBF0;cursor:default}
.match-item.matched-no{border-color:var(--coral);background:#FFF0F0;cursor:default}
.match-pair-line{font-size:12px;font-weight:700;color:var(--muted);padding:4px 0;text-align:center}
 
/* ── REINFORCE BANNER ── */
.reinforce-banner{background:#FFF4E0;border:2px solid var(--peach);border-radius:14px;padding:12px 16px;margin-bottom:12px;display:flex;align-items:flex-start;gap:10px}
.rb-icon{font-size:22px;flex-shrink:0}
.rb-text{font-size:13px;font-weight:700;color:#7a4500;line-height:1.6}
.rb-kp{display:inline-block;background:var(--peach);color:#fff;font-size:12px;font-weight:800;padding:3px 10px;border-radius:8px;margin-top:5px}
 
/* ── FEEDBACK ── */
.feedback{border-radius:16px;padding:16px;margin-top:10px}
.feedback.ok{background:#EDFBF0;border:2px solid var(--grass)}
.feedback.no{background:#FFF0F0;border:2px solid var(--coral)}
.feedback.nt{background:#F0F0FF;border:2px solid var(--lavender)}
.fb-icon{font-size:28px;margin-bottom:3px}
.fb-title{font-size:16px;font-weight:900}
.fb-text{font-size:13px;color:#555;margin-top:4px;font-weight:600;line-height:1.7}
 
/* ── RESULT (scrollable standalone screen) ── */
#screen-result{overflow-y:auto;height:100dvh}
.result-hero{text-align:center;padding:30px 20px 14px}
.result-emoji{font-size:80px;animation:pop .5s ease-out}
@keyframes pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
.result-title{font-size:26px;font-weight:900;margin-top:10px}
.result-sub{font-size:14px;color:var(--muted);font-weight:600;margin-top:5px}
.score-card{background:#fff;border-radius:24px;padding:20px;margin:0 18px;box-shadow:0 8px 24px rgba(0,0,0,.1);display:flex;justify-content:space-around;align-items:center}
.score-item{text-align:center}
.score-num{font-size:38px;font-weight:900}
.score-label{font-size:12px;color:var(--muted);font-weight:600;margin-top:4px}
.score-div{width:2px;height:52px;background:#EEE}
.stars-row{display:flex;justify-content:center;gap:7px;margin:14px 0}
.star-e{font-size:36px;animation:starPop .4s ease-out both}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg)}70%{transform:scale(1.2) rotate(10deg)}100%{transform:scale(1) rotate(0)}}
.star-e:nth-child(2){animation-delay:.15s}.star-e:nth-child(3){animation-delay:.3s}
.star-e:nth-child(4){animation-delay:.45s}.star-e:nth-child(5){animation-delay:.6s}
.result-msg{text-align:center;font-size:16px;font-weight:700;margin:0 18px 14px;padding:13px;background:#fff;border-radius:15px;box-shadow:0 4px 14px rgba(0,0,0,.07)}
.reinforce-preview{margin:0 18px 14px;background:#FFF4E0;border:2px solid var(--peach);border-radius:14px;padding:13px 16px}
.rp-title{font-size:13px;font-weight:800;color:#7a4500;margin-bottom:7px}
.rp-kp-list{display:flex;flex-wrap:wrap;gap:7px}
.rp-kp{background:var(--peach);color:#fff;font-size:12px;font-weight:700;padding:3px 10px;border-radius:8px}
.result-btns{padding:0 18px calc(24px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:11px}
 
/* ── CLEAR ── */
#screen-clear{background:linear-gradient(160deg,#E8F7FF,#FFF9F0);text-align:center;overflow-y:auto;height:100dvh}
.clear-confetti{font-size:90px;margin:36px 0 8px;animation:spin .8s ease-out}
@keyframes spin{0%{transform:rotate(-20deg) scale(0);opacity:0}60%{transform:rotate(10deg) scale(1.15)}100%{transform:rotate(0) scale(1);opacity:1}}
.clear-title{font-size:30px;font-weight:900}
.clear-sub{font-size:14px;color:var(--muted);font-weight:600;margin:8px 20px 0;line-height:1.7}
.celebrate{display:flex;justify-content:center;gap:8px;font-size:22px;margin:12px 0}
.unlock-card{margin:16px;background:linear-gradient(135deg,#C3A6FF,#9B6FEF);border-radius:22px;padding:20px;color:#fff;box-shadow:0 8px 0 #7a4fd0}
.unlock-icon{font-size:44px;margin-bottom:7px}
.unlock-title{font-size:19px;font-weight:900}
.unlock-sub{font-size:13px;opacity:.85;font-weight:600;margin-top:4px}
.clear-btns{padding:0 18px calc(24px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:11px}
 
/* ── PROGRESS ── */
#screen-progress{overflow-y:auto;height:100dvh}
.progress-hero{background:linear-gradient(135deg,var(--lavender),#9B6FEF);border-radius:22px;padding:20px;color:#fff;margin-bottom:16px;text-align:center}
.ph-stars{font-size:42px;font-weight:900}
.ph-label{font-size:14px;opacity:.85;font-weight:600;margin-top:3px}
.sec-title{font-size:14px;font-weight:800;color:var(--muted);margin-bottom:11px}
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:16px}
.ach-card{background:#fff;border-radius:16px;padding:14px;text-align:center;box-shadow:0 4px 14px rgba(0,0,0,.07)}
.ach-icon{font-size:30px;margin-bottom:5px}
.ach-label{font-size:11px;font-weight:700;color:var(--muted)}
.ach-val{font-size:20px;font-weight:900}
.upc{background:#fff;border-radius:18px;padding:16px;margin-bottom:11px;box-shadow:0 4px 14px rgba(0,0,0,.07)}
.upc-hd{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.upc-num{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;flex-shrink:0}
.upc-title{font-size:15px;font-weight:800}
.upc-sub{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
.mp-row{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.mp-label{width:44px;font-size:11px;font-weight:700;padding:3px 5px;border-radius:7px;text-align:center;flex-shrink:0}
.ml-ch{background:#FFE8E8;color:#c94040}.ml-re{background:#FFF0D6;color:#e65100}.ml-ex{background:#EEE8FF;color:#7a4fd0}
.mp-pct{font-size:11px;font-weight:700;color:var(--muted);width:34px;text-align:right}
.spacer{height:16px}
</style>
</head>
<body>
 
<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="home-hero">
    <span class="home-planet">🌏</span>
    <div class="home-title">學學星球</div>
    <div class="home-sub">國小二年級 ✨ 下學期</div>
    <div class="home-stars-badge">⭐ <span id="home-stars">0</span> 顆星</div>
  </div>
  <div class="home-menu">
    <button class="hbc hbc-1" onclick="goTo('screen-subject')">
      <span class="icon">🚀</span><span class="hbtext"><span>開始單元挑戰</span><span>選科目，開始學習！</span></span>
    </button>
    <button class="hbc hbc-2" onclick="goTo('screen-subject')">
      <span class="icon">🔄</span><span class="hbtext"><span>再練一次</span><span>複習做過的題目</span></span>
    </button>
    <button class="hbc hbc-3" onclick="goTo('screen-progress')">
      <span class="icon">📊</span><span class="hbtext"><span>我的進度</span><span>看看星星和成就</span></span>
    </button>
  </div>
</div>
 
<!-- SUBJECT -->
<div id="screen-subject" class="screen">
  <div class="topbar">
    <button class="topbar-back" onclick="goBack()">←</button>
    <span class="topbar-title">選科目</span>
    <div class="topbar-stars">⭐ <span class="sd">0</span></div>
  </div>
  <div class="scroll-area">
    <div class="spacer"></div>
    <div class="subject-grid">
      <button class="subject-card sc-chinese" onclick="goToUnits('chinese')">
        <span class="s-icon">📖</span><div class="s-name">國語</div><div class="s-pub">康軒版</div>
      </button>
      <button class="subject-card sc-locked" disabled>
        <span class="s-icon">🔢</span><div class="s-name">數學</div><div class="s-pub">翰林版</div>
        <div class="lock-chip">🔒 即將開放</div>
      </button>
      <button class="subject-card sc-locked" disabled>
        <span class="s-icon">🌍</span><div class="s-name">生活</div><div class="lock-chip">🔒 即將開放</div>
      </button>
      <button class="subject-card sc-locked" disabled>
        <span class="s-icon">🎨</span><div class="s-name">藝術</div><div class="lock-chip">🔒 即將開放</div>
      </button>
    </div>
  </div>
</div>
 
<!-- UNITS -->
<div id="screen-units" class="screen">
  <div class="topbar">
    <button class="topbar-back" onclick="goBack()">←</button>
    <span class="topbar-title" id="units-title">國語單元</span>
    <div class="topbar-stars">⭐ <span class="sd">0</span></div>
  </div>
  <div class="scroll-area"><div id="units-list"></div></div>
</div>
 
<!-- QUESTION — header fixed, content scrolls, footer fixed -->
<div id="screen-question" class="screen">
  <div class="topbar">
    <button class="topbar-back" onclick="confirmQuit()">✕</button>
    <span class="topbar-title" id="q-title">挑戰關</span>
    <div class="topbar-stars">⭐ <span class="sd">0</span></div>

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function goToUnits(subj){
  document.getElementById('units-title').textContent=subj==='chinese'?'國語單元':'數學單元';
  const c=document.getElementById('units-list');c.innerHTML='';
  DB.units.filter(u=>u.subject===subj).forEach((unit,idx,arr)=>{
    const p=UP[unit.unit_id]||{};
    const unlocked=idx===0||(UP[arr[idx-1].unit_id]?.challenge);
    const done=p.challenge&&p.reinforcement;
    const nc=!unlocked?'un-locked':done?'un-done':'un-active';
    const cc=!unlocked?'uc-locked':done?'uc-done':'uc-active';
    const ni=!unlocked?'🔒':done?'✓':unit.lesson_order;
    const bgs=[{k:'challenge',l:'挑戰關'},{k:'reinforcement',l:'補強關'},{k:'exploration',l:'探索關'}]
      .map(m=>{
        if(!unlocked)return`<span class="badge badge-locked">${m.l} 🔒</span>`;
        if(p[m.k])return`<span class="badge badge-done">${m.l} ✓</span>`;
        return`<span class="badge badge-todo">${m.l}</span>`;
      }).join('');
    const oc=unlocked?`openUnit('${unit.unit_id}')`:`alert('請先完成前一課！')`;
    c.innerHTML+=`<button class="unit-card ${cc}" onclick="${oc}">
      <div class="unit-num ${nc}">${ni}</div>
      <div class="unit-info">
        <div class="unit-title">第${unit.lesson_order}課　${unit.unit_title}</div>
        <div class="unit-sub">${unit.theme}</div>
        <div class="unit-badges">${bgs}</div>
      </div></button>`;
  });
  goTo('screen-units');
}
function openUnit(uid){
  S.unit=uid;const p=UP[uid];
  if(!p.challenge)startMode('challenge');
  else if(!p.reinforcement)startMode('reinforcement');
  else if(!p.exploration)startMode('exploration');
  else if(confirm('你已完成這一課！要重新挑戰嗎？'))startMode('challenge');
}

    S.questions=DB.challenge.map(q=>({...q}));

    if(wk.length===0){
      S.questions=[{qid:'re_perfect',kp:'',type:'all_correct',stem:'',answer:null,explanation:''}];
    } else {
      S.questions=wk.filter(kp=>DB.reinforcement_bank[kp]).map(kp=>({...DB.reinforcement_bank[kp]}));
    }
  } else {
    S.questions=DB.exploration.map(q=>({...q}));
  }
 
  const labels={challenge:'🎯 挑戰關',reinforcement:'💪 補強關',exploration:'🔭 探索關'};
  const cls={challenge:'qe-mode-challenge',reinforcement:'qe-mode-reinforce',exploration:'qe-mode-explore'};
  document.getElementById('q-chip').textContent=labels[mode];
  document.getElementById('q-chip').className='qe-mode-chip '+cls[mode];
  document.getElementById('q-title').textContent={challenge:'挑戰關',reinforcement:'補強關',exploration:'探索關'}[mode];
  goTo('screen-question');
  renderQ();
}
 
// ═══════════════════════════════════════════════════════
// RENDER Q
// ═══════════════════════════════════════════════════════
function renderQ(){
  const q=S.questions[S.qi],total=S.questions.length,idx=S.qi;
  S.answered=false;S.built=[];
  S.matchSelected=null;S.matchPairs={};S.matchDone=0;
 
  // header counters
  document.getElementById('q-ctr').textContent=`第 ${idx+1} / ${total} 題`;
  document.getElementById('q-pbar').style.width=(idx/total*100)+'%';
  const dots=document.getElementById('q-dots');dots.innerHTML='';
  for(let i=0;i<total;i++){
    const d=document.createElement('div');
    d.className='q-dot '+(i<idx?'done':i===idx?'current':'');
    dots.appendChild(d);
  }
 
  const r=document.getElementById('q-render');
  const f=document.getElementById('q-footer');
  r.innerHTML='';f.innerHTML='';
 
  // scroll back to top
  const sa=document.getElementById('q-scroll');
  if(sa)sa.scrollTop=0;
 
  // reinforce banner
  let banner='';
  if(S.mode==='reinforcement'&&q.kp&&KP_LABELS[q.kp]){
    banner=`<div class="reinforce-banner">
      <div class="rb-icon">💡</div>
      <div class="rb-text">針對你答錯的地方，換個問法再練一次！
        <br><span class="rb-kp">📌 ${KP_LABELS[q.kp]}</span></div>
    </div>`;
  }
 
  if(q.type==='all_correct'){
    r.innerHTML=`<div class="question-body" style="text-align:center;padding:36px 20px">
      <div style="font-size:56px;margin-bottom:12px">🏅</div>
      <div style="font-size:20px;font-weight:900;margin-bottom:8px">挑戰關全部答對！</div>
      <div style="font-size:14px;color:var(--muted);font-weight:600;line-height:1.8">你完全掌握了這一課，<br>不需要補強，直接通關！</div>
    </div>`;
    setFooter(`<button class="btn btn-lg btn-green" onclick="skipReinforce()">直接通關 🏆</button>`);
    return;
  }
 
  r.innerHTML=banner;
 
  if(q.type==='matching') renderMatching(q,r,f);
  else if(q.type==='sentence_reorder') renderReorder(q,r,f);
  else if(q.type==='handwrite_character'||q.type==='handwrite_radical'||q.type==='handwrite_word') renderWordInput(q,r,f);
  else if(q.type==='guided_sentence_writing') renderSentenceInput(q,r,f);
  else renderChoice(q,r,f);
}
 
// helper: set footer HTML (always in fixed footer div)
function setFooter(html){
  document.getElementById('q-footer').innerHTML=html;
}
 
// ═══════════════════════════════════════════════════════
// A. CHOICE
// ═══════════════════════════════════════════════════════
function renderChoice(q,r,f){
  const letters=['Ａ','Ｂ','Ｃ','Ｄ'];
  const hint=q.type==='fill_blank'?'<div class="q-hint">選出正確的詞語填入空格</div>':'';
  r.innerHTML+=`<div class="question-body">
    <div class="q-stem">${q.stem}</div>${hint}
    <div class="options-grid">
      ${q.options.map((o,i)=>`<button class="option-btn" id="opt-${i}" onclick="selOpt(${i})"><span class="opt-letter">${letters[i]}</span>${o}</button>`).join('')}
    </div>
    <div id="fb"></div>
  </div>`;
  setFooter(`<button class="btn btn-lg btn-primary btn-disabled" id="btn-next" onclick="nextQ()">下一題 →</button>`);
}
function selOpt(idx){
  if(S.answered)return;S.answered=true;
  const q=S.questions[S.qi],ok=q.options[idx]===q.answer;
  if(ok)S.correct++;else if(S.mode==='challenge')recordWrong(q.kp);
  document.querySelectorAll('.option-btn').forEach((btn,i)=>{
    if(q.options[i]===q.answer)btn.classList.add('correct');
    else if(i===idx&&!ok)btn.classList.add('wrong');
  });
  fbShow(ok,q.answer,q.explanation,'fb');
  document.getElementById('btn-next').classList.remove('btn-disabled');
}
 
// ═══════════════════════════════════════════════════════
// B. SENTENCE REORDER — chips are SHUFFLED on render
// ═══════════════════════════════════════════════════════
function renderReorder(q,r,f){
  // ★ 打亂詞卡，確保不是原句順序
  const shuffled=shuffle(q.options);
  r.innerHTML+=`<div class="question-body">
    <div class="q-stem">${q.stem}</div>
    <div class="q-hint">點詞語來排列句子 👇</div>
    <div class="answer-area" id="aa"><span style="color:#CCC;font-size:13px;font-weight:600">點詞語來組句子</span></div>
    <div class="chip-pool" id="cp">
      ${shuffled.map((o,i)=>`<button class="chip chip-src" id="chip-${i}" data-val="${esc(o)}" onclick="addChip(${i})">${o}</button>`).join('')}
    </div>
    <div id="fb"></div>
  </div>`;
  setFooter(`<button class="btn btn-lg btn-primary" onclick="submitReorder()">確認答案 ✓</button>
    <button class="btn btn-sm btn-ghost" style="align-self:center" onclick="clearReorder()">清除重排</button>`);
}
function addChip(idx){
  const el=document.getElementById('chip-'+idx);
  if(!el||el.classList.contains('used'))return;
  const val=el.dataset.val;
  el.classList.add('used');
  S.built.push({idx,val});
  refreshAA();
}
function refreshAA(){
  const aa=document.getElementById('aa');if(!aa)return;
  if(!S.built.length){aa.innerHTML='<span style="color:#CCC;font-size:13px;font-weight:600">點詞語來組句子</span>';return;}
  aa.innerHTML='';
  S.built.forEach((item,i)=>{
    const btn=document.createElement('button');
    btn.className='chip chip-sel';btn.textContent=item.val;
    btn.onclick=()=>{
      const src=document.getElementById('chip-'+item.idx);
      if(src)src.classList.remove('used');
      S.built.splice(i,1);refreshAA();
    };
    aa.appendChild(btn);
  });
}
function clearReorder(){
  S.built.forEach(item=>{const e=document.getElementById('chip-'+item.idx);if(e)e.classList.remove('used')});
  S.built=[];refreshAA();
}
function submitReorder(){
  if(S.answered)return;
  const q=S.questions[S.qi],built=S.built.map(i=>i.val).join('');
  if(!built){alert('請先排列詞語喔！');return;}
  S.answered=true;
  const ok=built===q.answer;
  if(ok)S.correct++;else if(S.mode==='challenge')recordWrong(q.kp);
  fbShow(ok,q.answer,q.explanation,'fb');
  setFooter(`<button class="btn btn-lg btn-primary" onclick="nextQ()">下一題 →</button>`);
}
 
// ═══════════════════════════════════════════════════════
// C. MATCHING
// ═══════════════════════════════════════════════════════
function renderMatching(q,r,f){
  // shuffle right side
  const rightShuffled=shuffle(q.right);
  const leftHtml=q.left.map((item,i)=>
    `<button class="match-item" id="ml-${i}" onclick="selML(${i},'${esc(item)}')">${item}</button>`).join('');
  const rightHtml=rightShuffled.map((item,i)=>
    `<button class="match-item" id="mr-${i}" onclick="selMR(${i},'${esc(item)}')">${item}</button>`).join('');
  r.innerHTML+=`<div class="question-body">
    <div class="q-stem">${q.stem}</div>
    <div class="q-hint">先點左邊的角色，再點右邊的景物配對</div>
    <div class="match-grid">
      <div><div class="match-col-title">🐾 小動物</div>${leftHtml}</div>
      <div><div class="match-col-title">🌸 景物</div>${rightHtml}</div>
    </div>
    <div id="match-lines" style="margin-top:8px;"></div>
    <div id="fb"></div>
  </div>`;
  setFooter(`<button class="btn btn-lg btn-primary btn-disabled" id="btn-next" onclick="nextQ()">下一題 →</button>`);
}
function selML(idx,val){
  if(S.answered)return;
  document.querySelectorAll('[id^="ml-"]').forEach(e=>e.classList.remove('selected'));
  S.matchSelected={idx,val};
  document.getElementById('ml-'+idx).classList.add('selected');
}
function selMR(idx,val){
  if(S.answered||!S.matchSelected)return;
  const leftVal=S.matchSelected.val;
  const ok=S.questions[S.qi].answer[leftVal]===val;
  const lEl=document.getElementById('ml-'+S.matchSelected.idx);
  const rEl=document.getElementById('mr-'+idx);
  lEl.classList.remove('selected');
  lEl.classList.add(ok?'matched-ok':'matched-no');
  rEl.classList.add(ok?'matched-ok':'matched-no');
  lEl.onclick=null;rEl.onclick=null;
  S.matchPairs[leftVal]=val;S.matchDone++;S.matchSelected=null;
  document.getElementById('match-lines').innerHTML+=
    `<div class="match-pair-line">${leftVal} ➜ ${val} ${ok?'✓':'✗ 正確：'+S.questions[S.qi].answer[leftVal]}</div>`;
  if(S.matchDone===S.questions[S.qi].left.length){
    S.answered=true;
    const allOk=Object.entries(S.matchPairs).every(([l,rv])=>S.questions[S.qi].answer[l]===rv);
    if(allOk)S.correct++;else if(S.mode==='challenge')recordWrong(S.questions[S.qi].kp);
    fbShow(allOk,'',S.questions[S.qi].explanation,'fb');
    document.getElementById('btn-next').classList.remove('btn-disabled');
  }
}
 
// ═══════════════════════════════════════════════════════
// D. WORD INPUT
// ═══════════════════════════════════════════════════════
function renderWordInput(q,r,f){
  const prompt=q.prompt_char?`<div style="text-align:center;margin:14px 0 6px">
    <span style="font-size:58px;font-weight:900">${q.prompt_char}</span>
    <div style="font-size:12px;color:var(--muted);font-weight:600;margin-top:3px">參考字形</div>
  </div>`:'';
  r.innerHTML+=`<div class="question-body">
    <div class="q-stem">${q.stem}</div>${prompt}
    <div class="input-tip">✏️ 可用手寫鍵盤輸入</div>
    <input class="ti-single" id="ti-word" type="text" placeholder="在這裡輸入"
      autocomplete="off" autocorrect="off" spellcheck="false" inputmode="text"
      onkeydown="if(event.key==='Enter')submitWord()">
    <div id="fb" style="margin-top:10px;"></div>
  </div>`;
  setFooter(`<button class="btn btn-lg btn-primary" onclick="submitWord()">確認答案 ✓</button>`);
  setTimeout(()=>{const el=document.getElementById('ti-word');if(el)el.focus()},200);
}
function submitWord(){
  if(S.answered)return;
  const q=S.questions[S.qi];
  const val=(document.getElementById('ti-word').value||'').trim();
  if(!val){alert('請先輸入答案喔！');return;}
  S.answered=true;
  UP[S.unit].hwDone=(UP[S.unit].hwDone||0)+1;
  const inp=document.getElementById('ti-word');
  if(q.answer===null){
    S.correct++;inp.classList.add('correct');inp.disabled=true;
    document.getElementById('fb').innerHTML=`<div class="feedback ok"><div class="fb-icon">🎉</div><div class="fb-title">寫得很好！</div><div class="fb-text">你寫的是「${val}」。<br>${q.explanation}</div></div>`;
  } else {
    const ok=val===q.answer;
    if(ok)S.correct++;else if(S.mode==='challenge')recordWrong(q.kp);
    inp.classList.add(ok?'correct':'wrong');inp.disabled=true;
    fbShow(ok,q.answer,q.explanation,'fb');
  }
  setFooter(`<button class="btn btn-lg btn-primary" onclick="nextQ()">下一題 →</button>`);
}
 
// ═══════════════════════════════════════════════════════
// E. SENTENCE INPUT
// ═══════════════════════════════════════════════════════
function renderSentenceInput(q,r,f){
  r.innerHTML+=`<div class="question-body">
    <div class="q-stem">${q.stem}</div>
    <div class="input-tip">✏️ 可用手寫鍵盤輸入整句話</div>
    <textarea class="ti-sentence" id="ti-sent" rows="3"
      placeholder="在這裡寫一句話…"
      autocomplete="off" autocorrect="off" spellcheck="false"></textarea>
    <div id="fb" style="margin-top:10px;"></div>
  </div>`;
  setFooter(`<button class="btn btn-lg btn-primary" onclick="submitSent()">確認答案 ✓</button>`);
  setTimeout(()=>{const el=document.getElementById('ti-sent');if(el)el.focus()},200);
}
function submitSent(){
  if(S.answered)return;
  const q=S.questions[S.qi];
  const val=(document.getElementById('ti-sent').value||'').trim();
  if(!val){alert('請先輸入一句話喔！');return;}
  S.answered=true;
  UP[S.unit].hwDone=(UP[S.unit].hwDone||0)+1;
  const ta=document.getElementById('ti-sent');
  const kw=q.keyword||null;
  const ok=!kw||val.includes(kw);
  if(ok)S.correct++;
  ta.classList.add(ok?'correct':'wrong');ta.disabled=true;
  if(ok){
    document.getElementById('fb').innerHTML=`<div class="feedback ok"><div class="fb-icon">🎉</div><div class="fb-title">寫得很棒！</div><div class="fb-text">你的句子：「${val}」<br>${q.explanation}</div></div>`;
  } else {
    document.getElementById('fb').innerHTML=`<div class="feedback no"><div class="fb-icon">🤔</div><div class="fb-title">記得要包含「${kw}」喔！</div><div class="fb-text">${q.explanation}</div></div>`;
  }
  setFooter(`<button class="btn btn-lg btn-primary" onclick="nextQ()">下一題 →</button>`);
}
 
// ═══════════════════════════════════════════════════════
// FEEDBACK
// ═══════════════════════════════════════════════════════
function fbShow(ok,answer,explanation,elId){
  const el=document.getElementById(elId);if(!el)return;
  el.innerHTML=ok
    ?`<div class="feedback ok"><div class="fb-icon">🎉</div><div class="fb-title">答對了！</div><div class="fb-text">${explanation}</div></div>`
    :`<div class="feedback no"><div class="fb-icon">🤔</div><div class="fb-title">再想想…</div><div class="fb-text">${answer?`正確答案是「${answer}」<br>`:''}${explanation}</div></div>`;
}
 
// ═══════════════════════════════════════════════════════
// WRONG KP
// ═══════════════════════════════════════════════════════
function recordWrong(kp){
  if(!kp||S.wrongKps.includes(kp))return;
  S.wrongKps.push(kp);
}
 
// ═══════════════════════════════════════════════════════
// NEXT / END
// ═══════════════════════════════════════════════════════
function nextQ(){S.qi++;if(S.qi>=S.questions.length)endMode();else renderQ();}
function endMode(){
  const p=UP[S.unit];p[S.mode]=true;
  if(S.mode==='challenge'){
    p.wrongKps=[...S.wrongKps];
    const e=calcStars(S.correct,S.questions.length);
    p.starsEarned=e;S.stars+=e;syncStars();showResult();
  } else if(S.mode==='reinforcement'){
    S.stars+=3;syncStars();showClear();
  } else {
    S.stars+=5;syncStars();showExploreDone();
  }
}
function calcStars(c,t){const r=c/t;return r===1?5:r>=.8?4:r>=.6?3:r>=.4?2:1;}
 
// ═══════════════════════════════════════════════════════
// RESULT
// ═══════════════════════════════════════════════════════
function showResult(){
  const t=S.questions.length,c=S.correct,r=c/t,p=UP[S.unit];
  const[em,ti]=r===1?['🤩','全對！你是小天才！']:r>=.6?['🎉','做得很好！']:['😊','繼續加油！'];
  document.getElementById('r-emoji').textContent=em;
  document.getElementById('r-title').textContent=ti;
  document.getElementById('r-sub').textContent=`完成挑戰關！答對 ${c}/${t} 題`;
  document.getElementById('r-correct').textContent=c;
  document.getElementById('r-total').textContent=t;
  document.getElementById('r-stars').textContent=`+${p.starsEarned}⭐`;
  let sh='';for(let i=0;i<5;i++)sh+=`<span class="star-e" style="${i>=p.starsEarned?'opacity:.2':''}">⭐</span>`;
  document.getElementById('r-stars-row').innerHTML=sh;
  const wk=p.wrongKps||[];
  const prev=document.getElementById('reinforce-preview');
  if(wk.length===0){
    prev.innerHTML=`<div class="reinforce-preview"><div class="rp-title">🏅 全部答對！補強關直接通關！</div></div>`;
    document.getElementById('btn-go-reinforce').textContent='🏆 直接通關';
  } else {
    const chips=wk.map(kp=>`<span class="rp-kp">${KP_LABELS[kp]||kp}</span>`).join('');
    prev.innerHTML=`<div class="reinforce-preview"><div class="rp-title">💡 補強關將針對這幾個知識點：</div><div class="rp-kp-list">${chips}</div></div>`;
  }
  document.getElementById('r-msg').textContent=
    r===1?'完美！直接通關吧！':r>=.6?'不錯！補強關針對答錯地方再練！':'沒關係，補強關幫你補強！';
  S.history=[];goTo('screen-result');
}
function startReinforce(){startMode('reinforcement')}
function skipReinforce(){UP[S.unit].reinforcement=true;S.stars+=3;syncStars();showClear();}
function showClear(){S.history=[];goTo('screen-clear')}
function startExplore(){startMode('exploration')}
function showExploreDone(){
  const unit=DB.units.find(u=>u.unit_id===S.unit);
  document.getElementById('q-render').innerHTML=`<div class="question-body" style="text-align:center;padding:36px 20px">
    <div style="font-size:66px;margin-bottom:12px">🌟</div>
    <div style="font-size:22px;font-weight:900;margin-bottom:8px">探索完成！</div>
    <div style="font-size:14px;color:var(--muted);font-weight:600;line-height:1.8">
      你完成了《${unit.unit_title}》全部三關！<br>獲得 ＋5⭐ 星星！<br><br>
      <span style="font-size:24px">🎊 🎉 ✨</span></div></div>`;
  setFooter(`<button class="btn btn-lg btn-purple" onclick="goTo('screen-units')">🏠 回到單元列表</button>
    <button class="btn btn-lg btn-ghost" style="margin-top:2px" onclick="goTo('screen-progress')">📊 看我的進度</button>`);
}
 
// ═══════════════════════════════════════════════════════
// PROGRESS
// ═══════════════════════════════════════════════════════
function renderProgress(){
  const all=Object.values(UP);
  document.getElementById('a-ch').textContent=all.filter(p=>p.challenge).length;
  document.getElementById('a-re').textContent=all.filter(p=>p.reinforcement).length;
  document.getElementById('a-ex').textContent=all.filter(p=>p.exploration).length;
  document.getElementById('a-hw').textContent=all.reduce((s,p)=>s+(p.hwDone||0),0);
  const c=document.getElementById('p-units');c.innerHTML='';
  DB.units.filter(u=>u.subject==='chinese').forEach((unit,idx)=>{
    const p=UP[unit.unit_id]||{};
    const color=['#FF6B6B','#6ECFF0','#6BCB77'][idx%3];
    const modes=[
      {k:'challenge',l:'挑戰',cl:'ml-ch',col:'var(--coral)'},
      {k:'reinforcement',l:'補強',cl:'ml-re',col:'var(--peach)'},
      {k:'exploration',l:'探索',cl:'ml-ex',col:'var(--lavender)'}
    ];
    const mh=modes.map(m=>`<div class="mp-row">
      <span class="mp-label ${m.cl}">${m.l}</span>
      <div class="progress-wrap" style="flex:1;height:9px;margin:0">
        <div class="progress-bar" style="width:${p[m.k]?100:0}%;background:${m.col}"></div>
      </div>
      <span class="mp-pct">${p[m.k]?100:0}%</span>
    </div>`).join('');
    c.innerHTML+=`<div class="upc"><div class="upc-hd">
      <div class="upc-num" style="background:${color}">${unit.lesson_order}</div>
      <div style="flex:1"><div class="upc-title">${unit.unit_title}</div><div class="upc-sub">${unit.version} ．${unit.semester}</div></div>
      <div style="font-weight:900;color:var(--sun);font-size:17px">${p.starsEarned?'⭐'.repeat(p.starsEarned):'—'}</div>
    </div>${mh}</div>`;
  });
}
 
function esc(s){return(s||'').replace(/'/g,"\\'").replace(/"/g,'&quot;')}
syncStars();
</script>
