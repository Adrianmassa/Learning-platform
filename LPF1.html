<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學學星球 ✨ 二年級學習平台</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
:root{--sky:#6ECFF0;--sun:#FFD93D;--grass:#6BCB77;--coral:#FF6B6B;--lavender:#C3A6FF;--peach:#FFB347;--bg:#FFF9F0;--text:#2D2D2D;--muted:#8A8A8A}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito','Noto Sans TC',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);overflow-x:hidden}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.06);position:sticky;top:0;z-index:100}
.topbar-back{width:44px;height:44px;border-radius:50%;border:none;background:#F0F0F0;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.topbar-back:active{transform:scale(.9)}
.topbar-title{font-size:17px;font-weight:800}
.topbar-stars{display:flex;align-items:center;gap:4px;background:var(--sun);padding:6px 14px;border-radius:20px;font-weight:800;font-size:15px}
.content{flex:1;overflow-y:auto;padding:18px}
 
/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;font-family:inherit;font-weight:800;border-radius:20px;transition:transform .12s,box-shadow .12s;user-select:none}
.btn-lg{width:100%;padding:20px;font-size:20px;border-radius:24px}
.btn-sm{padding:10px 20px;font-size:14px;border-radius:14px}
.btn-primary{background:var(--coral);color:#fff;box-shadow:0 6px 0 #c94040}
.btn-primary:active{box-shadow:0 2px 0 #c94040;transform:translateY(4px) scale(.97)}
.btn-green{background:var(--grass);color:#fff;box-shadow:0 6px 0 #4aaa58}
.btn-green:active{box-shadow:0 2px 0 #4aaa58;transform:translateY(4px) scale(.97)}
.btn-yellow{background:var(--sun);color:#333;box-shadow:0 6px 0 #e0b800}
.btn-yellow:active{box-shadow:0 2px 0 #e0b800;transform:translateY(4px) scale(.97)}
.btn-purple{background:var(--lavender);color:#fff;box-shadow:0 6px 0 #9c78e0}
.btn-purple:active{box-shadow:0 2px 0 #9c78e0;transform:translateY(4px) scale(.97)}
.btn-ghost{background:#F0F0F0;color:var(--text);box-shadow:0 4px 0 #D0D0D0}
.btn-ghost:active{box-shadow:0 2px 0 #D0D0D0;transform:translateY(2px) scale(.97)}
.btn-disabled{background:#E0E0E0!important;color:#AAA!important;box-shadow:none!important;cursor:not-allowed;pointer-events:none}
 
/* PROGRESS */
.progress-wrap{background:#F0F0F0;border-radius:12px;height:14px;overflow:hidden;margin:8px 0}
.progress-bar{height:100%;border-radius:12px;background:linear-gradient(90deg,var(--grass),var(--sky));transition:width .5s ease}
.q-dots{display:flex;gap:6px}
.q-dot{width:10px;height:10px;border-radius:50%;background:#E0E0E0}
.q-dot.done{background:var(--grass)}.q-dot.current{background:var(--coral);transform:scale(1.3)}
 
/* HOME */
#screen-home{background:linear-gradient(170deg,#E8F7FF 0%,#FFF9F0 60%)}
.home-hero{padding:30px 20px 10px;text-align:center}
.home-planet{font-size:80px;animation:float 3s ease-in-out infinite;display:block;margin:0 auto 10px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.home-title{font-size:32px;font-weight:900}
.home-sub{font-size:16px;color:var(--muted);margin-top:6px;font-weight:600}
.home-stars-badge{display:inline-flex;align-items:center;gap:6px;background:var(--sun);padding:8px 20px;border-radius:20px;font-weight:900;font-size:18px;margin:16px auto 0}
.home-menu{padding:20px;display:flex;flex-direction:column;gap:14px}
.hbc{border-radius:24px;padding:22px 20px;display:flex;align-items:center;gap:16px;cursor:pointer;border:none;font-family:inherit;font-weight:800;font-size:19px;color:#fff;text-align:left;width:100%}
.hbc .icon{font-size:38px;flex-shrink:0}
.hbtext{display:flex;flex-direction:column}
.hbtext span:last-child{font-size:14px;font-weight:600;opacity:.85;margin-top:2px}
.hbc-1{background:linear-gradient(135deg,#FF6B6B,#FF8E53);box-shadow:0 8px 0 #c94040}
.hbc-1:active{box-shadow:0 3px 0 #c94040;transform:translateY(5px) scale(.98)}
.hbc-2{background:linear-gradient(135deg,#6ECFF0,#43A8D0);box-shadow:0 8px 0 #3088b0}
.hbc-2:active{box-shadow:0 3px 0 #3088b0;transform:translateY(5px) scale(.98)}
.hbc-3{background:linear-gradient(135deg,#C3A6FF,#9B6FEF);box-shadow:0 8px 0 #7a4fd0}
.hbc-3:active{box-shadow:0 3px 0 #7a4fd0;transform:translateY(5px) scale(.98)}
 
/* SUBJECT */
.subject-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.subject-card{border-radius:24px;padding:24px 16px;text-align:center;cursor:pointer;border:none;font-family:inherit;transition:transform .15s;box-shadow:0 8px 32px rgba(0,0,0,.1)}
.subject-card:active{transform:scale(.95)}
.subject-card .s-icon{font-size:52px;display:block;margin-bottom:10px}
.subject-card .s-name{font-size:20px;font-weight:900;color:#fff}
.subject-card .s-pub{font-size:13px;font-weight:600;color:rgba(255,255,255,.8);margin-top:4px}
.sc-chinese{background:linear-gradient(135deg,#FF6B6B,#FF9A9A);box-shadow:0 8px 0 #c94040}
.sc-locked{background:linear-gradient(135deg,#CCC,#AAA);box-shadow:0 8px 0 #888;cursor:not-allowed}
.lock-chip{display:inline-block;background:rgba(0,0,0,.15);color:#fff;font-size:12px;font-weight:700;padding:4px 10px;border-radius:10px;margin-top:6px}
 
/* UNITS */
.unit-card{border-radius:20px;padding:18px 20px;margin-bottom:14px;cursor:pointer;border:none;font-family:inherit;text-align:left;width:100%;display:flex;align-items:center;gap:16px;box-shadow:0 4px 16px rgba(0,0,0,.07);background:#fff;border-left:6px solid transparent}
.uc-active{border-left-color:var(--coral)}.uc-done{border-left-color:var(--grass)}.uc-locked{opacity:.5;cursor:not-allowed}
.unit-num{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff;flex-shrink:0}
.un-active{background:var(--coral)}.un-done{background:var(--grass)}.un-locked{background:#CCC}
.unit-info{flex:1}
.unit-title{font-size:17px;font-weight:800}
.unit-sub{font-size:12px;color:var(--muted);margin-top:3px}
.unit-badges{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.badge{padding:4px 10px;border-radius:10px;font-size:12px;font-weight:700}
.badge-done{background:#D4F5DB;color:#2e7d32}
.badge-todo{background:#FFE8D6;color:#e65100}
.badge-locked{background:#EEE;color:#888}
 
/* Q ENGINE */
.qe-header{padding:14px 18px 0}
.qe-mode-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:12px;font-size:13px;font-weight:700;color:#fff;margin-bottom:10px}
.qe-mode-challenge{background:var(--coral)}.qe-mode-reinforce{background:var(--peach);color:#333}.qe-mode-explore{background:var(--lavender)}
.q-counter{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.question-body{background:#fff;border-radius:24px;padding:26px 22px;margin-bottom:14px;box-shadow:0 4px 16px rgba(0,0,0,.07);min-height:180px}
.q-stem{font-size:21px;font-weight:800;line-height:1.7;margin-bottom:18px}
.q-hint{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:12px}
 
/* OPTIONS */
.options-grid{display:flex;flex-direction:column;gap:11px}
.option-btn{border:3px solid #E8E8E8;background:#fff;border-radius:18px;padding:15px 18px;font-family:inherit;font-size:18px;font-weight:700;color:var(--text);cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px}
.option-btn:active{transform:scale(.98)}
.option-btn.correct{border-color:var(--grass);background:#EDFBF0}
.option-btn.wrong{border-color:var(--coral);background:#FFF0F0}
.opt-letter{width:34px;height:34px;border-radius:50%;background:#F0F0F0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;flex-shrink:0}
.option-btn.correct .opt-letter{background:var(--grass);color:#fff}
.option-btn.wrong .opt-letter{background:var(--coral);color:#fff}
 
/* TEXT INPUT (handwrite / fill) */
.text-input-wrap{margin-top:6px;margin-bottom:4px}
.text-input-label{font-size:13px;font-weight:700;color:var(--muted);margin-bottom:6px}
 
/* 單一輸入框 */
.ti-single{
  width:100%;
  border:3px solid #E0E0E0;
  border-radius:18px;
  padding:18px 20px;
  font-family:inherit;
  font-size:26px;
  font-weight:800;
  color:var(--text);
  outline:none;
  text-align:center;
  letter-spacing:4px;
  transition:border-color .2s, box-shadow .2s;
  background:#FAFAFA;
}
.ti-single:focus{border-color:var(--sky);box-shadow:0 0 0 4px rgba(110,207,240,.15);background:#fff}
.ti-single.correct{border-color:var(--grass);background:#EDFBF0}
.ti-single.wrong{border-color:var(--coral);background:#FFF0F0}
 
/* 句子輸入框（長文輸入） */
.ti-sentence{
  width:100%;
  border:3px solid #E0E0E0;
  border-radius:18px;
  padding:18px 20px;
  font-family:inherit;
  font-size:20px;
  font-weight:700;
  color:var(--text);
  outline:none;
  transition:border-color .2s, box-shadow .2s;
  background:#FAFAFA;
  resize:none;
  line-height:1.7;
}
.ti-sentence:focus{border-color:var(--sky);box-shadow:0 0 0 4px rgba(110,207,240,.15);background:#fff}
.ti-sentence.correct{border-color:var(--grass);background:#EDFBF0}
.ti-sentence.wrong{border-color:var(--coral);background:#FFF0F0}
 
/* 多空格排列（句型填空） */
.multi-blank-row{display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin:12px 0}
.mb-text{font-size:19px;font-weight:800;color:var(--text)}
.mb-input{
  border:3px solid #E0E0E0;
  border-radius:14px;
  padding:12px 14px;
  font-family:inherit;
  font-size:19px;
  font-weight:800;
  color:var(--text);
  outline:none;
  text-align:center;
  min-width:80px;
  max-width:140px;
  background:#FAFAFA;
  transition:border-color .2s;
}
.mb-input:focus{border-color:var(--sky);background:#fff}
.mb-input.correct{border-color:var(--grass);background:#EDFBF0}
.mb-input.wrong{border-color:var(--coral);background:#FFF0F0}
 
/* 輸入提示標籤 */
.input-tip{
  display:inline-flex;align-items:center;gap:6px;
  background:#F0F8FF;border:1.5px solid #B8E4F9;
  border-radius:10px;padding:6px 12px;
  font-size:12px;font-weight:700;color:#2a7da0;
  margin-bottom:12px;
}
 
/* DUAL FILL */
.dual-section{margin-bottom:14px}
.dual-label{font-size:14px;font-weight:800;color:var(--muted);margin-bottom:6px}
.dual-opt{border:3px solid #E8E8E8;background:#fff;border-radius:16px;padding:12px 16px;font-family:inherit;font-size:17px;font-weight:700;cursor:pointer;text-align:left;display:flex;align-items:center;gap:10px;margin-bottom:8px;width:100%}
.dual-opt.correct{border-color:var(--grass);background:#EDFBF0}
.dual-opt.wrong{border-color:var(--coral);background:#FFF0F0}
.dual-opt-letter{width:30px;height:30px;border-radius:50%;background:#F0F0F0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0}
.dual-opt.correct .dual-opt-letter{background:var(--grass);color:#fff}
.dual-opt.wrong .dual-opt-letter{background:var(--coral);color:#fff}
 
/* CHIPS */
.chip-pool{display:flex;flex-wrap:wrap;gap:10px;margin:10px 0}
.chip{padding:10px 16px;border-radius:14px;font-size:17px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
.chip:active{transform:scale(.93)}
.chip-src{background:#EEE;color:var(--text)}
.chip-src.used{opacity:.3;pointer-events:none}
.chip-sel{background:var(--sky);color:#fff}
.answer-area{min-height:52px;border:3px dashed #D0D0D0;border-radius:16px;padding:10px 14px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;background:#FAFAFA;margin:10px 0}
 
/* FEEDBACK */
.feedback{border-radius:18px;padding:18px;margin-top:10px}
.feedback.ok{background:#EDFBF0;border:2px solid var(--grass)}
.feedback.no{background:#FFF0F0;border:2px solid var(--coral)}
.feedback.nt{background:#F0F0FF;border:2px solid var(--lavender)}
.fb-icon{font-size:30px;margin-bottom:4px}
.fb-title{font-size:17px;font-weight:900}
.fb-text{font-size:14px;color:#555;margin-top:5px;font-weight:600;line-height:1.7}
 
.q-footer{padding:0 18px 24px;display:flex;flex-direction:column;gap:11px}
 
/* RESULT */
#screen-result{background:linear-gradient(160deg,#FFF0E0,#FFF9F0)}
.result-hero{text-align:center;padding:30px 20px 14px}
.result-emoji{font-size:88px;animation:pop .5s ease-out}
@keyframes pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
.result-title{font-size:28px;font-weight:900;margin-top:10px}
.result-sub{font-size:15px;color:var(--muted);font-weight:600;margin-top:5px}
.score-card{background:#fff;border-radius:26px;padding:22px;margin:0 18px;box-shadow:0 8px 32px rgba(0,0,0,.1);display:flex;justify-content:space-around;align-items:center}
.score-item{text-align:center}
.score-num{font-size:40px;font-weight:900}
.score-label{font-size:13px;color:var(--muted);font-weight:600;margin-top:4px}
.score-div{width:2px;height:56px;background:#EEE}
.stars-row{display:flex;justify-content:center;gap:8px;margin:16px 0}
.star-e{font-size:38px;animation:starPop .4s ease-out both}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg)}70%{transform:scale(1.2) rotate(10deg)}100%{transform:scale(1) rotate(0)}}
.star-e:nth-child(2){animation-delay:.15s}.star-e:nth-child(3){animation-delay:.3s}
.star-e:nth-child(4){animation-delay:.45s}.star-e:nth-child(5){animation-delay:.6s}
.result-msg{text-align:center;font-size:17px;font-weight:700;margin:0 18px 18px;padding:14px;background:#fff;border-radius:16px;box-shadow:0 4px 16px rgba(0,0,0,.07)}
 
/* CLEAR */
#screen-clear{background:linear-gradient(160deg,#E8F7FF,#FFF9F0);text-align:center}
.clear-confetti{font-size:96px;margin:36px 0 8px;animation:spin .8s ease-out}
@keyframes spin{0%{transform:rotate(-20deg) scale(0);opacity:0}60%{transform:rotate(10deg) scale(1.15)}100%{transform:rotate(0) scale(1);opacity:1}}
.clear-title{font-size:32px;font-weight:900}
.clear-sub{font-size:15px;color:var(--muted);font-weight:600;margin:8px 20px 0;line-height:1.7}
.celebrate{display:flex;justify-content:center;gap:8px;font-size:24px;margin:12px 0}
.unlock-card{margin:18px;background:linear-gradient(135deg,#C3A6FF,#9B6FEF);border-radius:24px;padding:22px;color:#fff;box-shadow:0 8px 0 #7a4fd0}
.unlock-icon{font-size:48px;margin-bottom:8px}
.unlock-title{font-size:21px;font-weight:900}
.unlock-sub{font-size:14px;opacity:.85;font-weight:600;margin-top:5px}
 
/* PROGRESS */
.progress-hero{background:linear-gradient(135deg,var(--lavender),#9B6FEF);border-radius:24px;padding:22px;color:#fff;margin-bottom:18px;text-align:center}
.ph-stars{font-size:44px;font-weight:900}
.ph-label{font-size:15px;opacity:.85;font-weight:600;margin-top:4px}
.sec-title{font-size:15px;font-weight:800;color:var(--muted);margin-bottom:12px}
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.ach-card{background:#fff;border-radius:18px;padding:16px;text-align:center;box-shadow:0 4px 16px rgba(0,0,0,.07)}
.ach-icon{font-size:34px;margin-bottom:6px}
.ach-label{font-size:12px;font-weight:700;color:var(--muted)}
.ach-val{font-size:22px;font-weight:900}
.upc{background:#fff;border-radius:20px;padding:18px;margin-bottom:12px;box-shadow:0 4px 16px rgba(0,0,0,.07)}
.upc-hd{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.upc-num{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;color:#fff;flex-shrink:0}
.upc-title{font-size:16px;font-weight:800}
.upc-sub{font-size:12px;color:var(--muted);font-weight:600;margin-top:2px}
.mp-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.mp-label{width:48px;font-size:11px;font-weight:700;padding:4px 6px;border-radius:8px;text-align:center;flex-shrink:0}
.ml-ch{background:#FFE8E8;color:#c94040}.ml-re{background:#FFF0D6;color:#e65100}.ml-ex{background:#EEE8FF;color:#7a4fd0}
.mp-pct{font-size:12px;font-weight:700;color:var(--muted);width:36px;text-align:right}
.spacer{height:16px}
</style>
</head>
<body>
 
<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="home-hero">
    <span class="home-planet">🌏</span>
    <div class="home-title">學學星球</div>
    <div class="home-sub">國小二年級 ✨ 下學期</div>
    <div class="home-stars-badge">⭐ <span id="home-stars">0</span> 顆星</div>
  </div>
  <div class="home-menu">
    <button class="hbc hbc-1" onclick="goTo('screen-subject')">
      <span class="icon">🚀</span><span class="hbtext"><span>開始單元挑戰</span><span>選科目，開始學習！</span></span>
    </button>
    <button class="hbc hbc-2" onclick="goTo('screen-subject')">
      <span class="icon">🔄</span><span class="hbtext"><span>再練一次</span><span>複習做過的題目</span></span>
    </button>
    <button class="hbc hbc-3" onclick="goTo('screen-progress')">
      <span class="icon">📊</span><span class="hbtext"><span>我的進度</span><span>看看星星和成就</span></span>
    </button>
  </div>
</div>
 
<!-- SUBJECT -->
<div id="screen-subject" class="screen">
  <div class="topbar">
    <button class="topbar-back" onclick="goBack()">←</button>
    <span class="topbar-title">選科目</span>
    <div class="topbar-stars">⭐ <span class="sd">0</span></div>
  </div>
  <div class="content">
    <div class="spacer"></div>
    <div class="subject-grid">
      <button class="subject-card sc-chinese" onclick="goToUnits('chinese')">
        <span class="s-icon">📖</span><div class="s-name">國語</div><div class="s-pub">康軒版</div>
      </button>
      <button class="subject-card sc-locked" disabled>
        <span class="s-icon">🔢</span><div class="s-name">數學</div><div class="s-pub">翰林版</div><div class="lock-chip">🔒 即將開放</div>
      </button>
      <button class="subject-card sc-locked" disabled><span class="s-icon">🌍</span><div class="s-name">生活</div><div class="lock-chip">🔒 即將開放</div></button>
      <button class="subject-card sc-locked" disabled><span class="s-icon">🎨</span><div class="s-name">藝術</div><div class="lock-chip">🔒 即將開放</div></button>
    </div>
  </div>
</div>
 
<!-- UNITS -->
<div id="screen-units" class="screen">
  <div class="topbar">
    <button class="topbar-back" onclick="goBack()">←</button>
    <span class="topbar-title" id="units-title">國語單元</span>
    <div class="topbar-stars">⭐ <span class="sd">0</span></div>
  </div>
  <div class="content"><div id="units-list"></div></div>
</div>
 
<!-- QUESTION -->
<div id="screen-question" class="screen">
  <div class="topbar">
    <button class="topbar-back" onclick="confirmQuit()">✕</button>
    <span class="topbar-title" id="q-title">挑戰關</span>
    <div class="topbar-stars">⭐ <span class="sd">0</span></div>
  </div>
  <div class="qe-header">
    <div id="q-chip" class="qe-mode-chip qe-mode-challenge">🎯 挑戰關</div>
    <div class="q-counter">
      <span id="q-ctr" style="font-weight:800;font-size:14px;color:var(--muted)">第 1/1 題</span>
      <div class="q-dots" id="q-dots"></div>
    </div>
    <div class="progress-wrap"><div class="progress-bar" id="q-pbar" style="width:0%"></div></div>
  </div>
  <div class="content" style="padding-top:14px"><div id="q-render"></div></div>
  <div class="q-footer" id="q-footer"></div>
</div>
 
<!-- RESULT -->
<div id="screen-result" class="screen">
  <div class="topbar" style="background:transparent;box-shadow:none"><div></div><span class="topbar-title">挑戰結果</span><div></div></div>

// ════════════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════════════
const S={screen:'screen-home',history:[],stars:0,unit:null,mode:null,questions:[],qi:0,correct:0,answered:false,built:[],dslot:0,dchosen:['','']};
const UP={"g2_ch_kanox_s2_l01":{challenge:false,reinforcement:false,exploration:false,starsEarned:0,hwDone:0}};
 
// ════════════════════════════════════════════════════════
// NAV
// ════════════════════════════════════════════════════════
function goTo(id){S.history.push(S.screen);show(id)}
function goBack(){show(S.history.pop()||'screen-home')}
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  S.screen=id;syncStars();
  if(id==='screen-progress')renderProgress();
}
function syncStars(){
  document.getElementById('home-stars').textContent=S.stars;
  document.getElementById('p-stars').textContent=S.stars;
  document.querySelectorAll('.sd').forEach(e=>e.textContent=S.stars);
}
function confirmQuit(){if(confirm('要離開這一關嗎？進度不會儲存喔！'))goTo('screen-units')}
 
// ════════════════════════════════════════════════════════
// UNITS
// ════════════════════════════════════════════════════════
function goToUnits(s){
  document.getElementById('units-title').textContent=s==='chinese'?'國語單元':'數學單元';
  const c=document.getElementById('units-list');c.innerHTML='';
  DB.units.filter(u=>u.subject===s).forEach((unit,idx,arr)=>{
    const p=UP[unit.unit_id]||{};
    const unlocked=idx===0||(UP[arr[idx-1].unit_id]?.challenge);
    const done=p.challenge&&p.reinforcement;
    const nc=!unlocked?'un-locked':done?'un-done':'un-active';
    const cc=!unlocked?'uc-locked':done?'uc-done':'uc-active';
    const ni=!unlocked?'🔒':done?'✓':unit.lesson_order;
    const modes=[{k:'challenge',l:'挑戰關'},{k:'reinforcement',l:'補強關'},{k:'exploration',l:'探索關'}];
    const bgs=modes.map(m=>{
      if(!unlocked)return`<span class="badge badge-locked">${m.l} 🔒</span>`;
      if(p[m.k])return`<span class="badge badge-done">${m.l} ✓</span>`;
      return`<span class="badge badge-todo">${m.l}</span>`;
    }).join('');
    const oc=unlocked?`openUnit('${unit.unit_id}')`:`alert('請先完成前一課！')`;
    c.innerHTML+=`<button class="unit-card ${cc}" onclick="${oc}">
      <div class="unit-num ${nc}">${ni}</div>
      <div class="unit-info">
        <div class="unit-title">第${unit.lesson_order}課　${unit.unit_title}</div>
        <div class="unit-sub">${unit.theme}</div>
        <div class="unit-badges">${bgs}</div>
      </div></button>`;
  });
  goTo('screen-units');
}
function openUnit(uid){
  S.unit=uid;const p=UP[uid];
  if(!p.challenge)startMode('challenge');
  else if(!p.reinforcement)startMode('reinforcement');
  else if(!p.exploration)startMode('exploration');
  else if(confirm('你已完成這一課！要重新挑戰嗎？'))startMode('challenge');
}
 
// ════════════════════════════════════════════════════════
// MODE
// ════════════════════════════════════════════════════════
function startMode(mode){
  S.mode=mode;S.qi=0;S.correct=0;
  S.questions=DB.questions.filter(q=>q.unit_id===S.unit&&q.mode_type===mode);
  const labels={challenge:'🎯 挑戰關',reinforcement:'💪 補強關',exploration:'🔭 探索關'};
  const cls={challenge:'qe-mode-challenge',reinforcement:'qe-mode-reinforce',exploration:'qe-mode-explore'};
  const tl={challenge:'挑戰關',reinforcement:'補強關',exploration:'探索關'};
  document.getElementById('q-chip').textContent=labels[mode];
  document.getElementById('q-chip').className='qe-mode-chip '+cls[mode];
  document.getElementById('q-title').textContent=tl[mode];
  goTo('screen-question');renderQ();
}
 
// ════════════════════════════════════════════════════════
// RENDER QUESTION
// ════════════════════════════════════════════════════════
function renderQ(){
  const q=S.questions[S.qi],total=S.questions.length,idx=S.qi;
  S.answered=false;S.built=[];S.dslot=0;S.dchosen=['',''];
  document.getElementById('q-ctr').textContent=`第 ${idx+1} / ${total} 題`;
  document.getElementById('q-pbar').style.width=(idx/total*100)+'%';
  const dots=document.getElementById('q-dots');dots.innerHTML='';
  for(let i=0;i<total;i++){const d=document.createElement('div');d.className='q-dot '+(i<idx?'done':i===idx?'current':'');dots.appendChild(d);}
  const c=document.getElementById('q-render'),f=document.getElementById('q-footer');
  c.innerHTML='';f.innerHTML='';
 
  if(q.response_mode==='handwrite_input'){
    // 手寫輸入型：依 question_type 決定輸入框型態
    if(q.question_type==='guided_sentence_writing'){
      renderSentenceInput(q,c,f);
    } else {
      // handwrite_character, handwrite_radical, handwrite_word
      renderWordInput(q,c,f);
    }
  } else if(q.question_type==='sentence_reorder'){
    renderReorder(q,c,f);
  } else if(q.question_type==='sentence_pattern_fill_dual'){
    renderDual(q,c,f);
  } else {
    renderChoice(q,c,f);
  }
}
 
// ════════════════════════════════════════════════════════
// 手寫輸入 A：單字 / 詞語 / 部首（單一輸入框）
// ════════════════════════════════════════════════════════
function renderWordInput(q,c,f){
  // 若有 prompt_char，顯示要寫的字作為參考
  const promptHtml = q.prompt_char
    ? `<div style="text-align:center;margin:16px 0 8px">
        <span style="font-size:60px;font-weight:900;color:#333;letter-spacing:4px">${q.prompt_char}</span>
        <div style="font-size:12px;color:var(--muted);font-weight:600;margin-top:4px">參考字形</div>
       </div>`
    : '';
 
  c.innerHTML=`<div class="question-body">
    <div class="q-stem">${q.stem}</div>
    ${promptHtml}
    <div class="input-tip">✏️ 可用手寫鍵盤輸入</div>
    <div class="text-input-wrap">
      <input class="ti-single" id="ti-word" type="text"
        placeholder="在這裡輸入"
        autocomplete="off" autocorrect="off" spellcheck="false"
        inputmode="text"
        onkeydown="if(event.key==='Enter')submitWordInput()"
      >
    </div>
    <div id="fb" style="margin-top:12px;"></div>
  </div>`;
  f.innerHTML=`<button class="btn btn-lg btn-primary" onclick="submitWordInput()">確認答案 ✓</button>`;
  setTimeout(()=>{const el=document.getElementById('ti-word');if(el)el.focus()},200);
}
 
function submitWordInput(){
  if(S.answered)return;
  const q=S.questions[S.qi];
  const val=(document.getElementById('ti-word').value||'').trim();
  if(!val){alert('請先輸入答案喔！');return;}
  S.answered=true;
  const inp=document.getElementById('ti-word');
 
  if(q.answer===null){
    // 開放式：只要有輸入就給分
    S.correct++;
    inp.classList.add('correct');
    document.getElementById('fb').innerHTML=`<div class="feedback ok"><div class="fb-icon">🎉</div><div class="fb-title">寫得很好！</div><div class="fb-text">你寫的是「${val}」。${q.explanation}</div></div>`;
  } else {
    const ok=val===q.answer;
    if(ok)S.correct++;
    inp.classList.add(ok?'correct':'wrong');
    inp.disabled=true;
    fb(ok,q.answer,q.explanation,'fb');
  }
  UP[S.unit].hwDone=(UP[S.unit].hwDone||0)+1;
  document.getElementById('q-footer').innerHTML=`<button class="btn btn-lg btn-primary" onclick="nextQ()">下一題 →</button>`;
}
 
// ════════════════════════════════════════════════════════
// 手寫輸入 B：句子輸入（guided_sentence_writing）
// ════════════════════════════════════════════════════════
function renderSentenceInput(q,c,f){
  c.innerHTML=`<div class="question-body">
    <div class="q-stem">${q.stem}</div>
    <div class="input-tip">✏️ 可用手寫鍵盤輸入整句話</div>
    <div class="text-input-wrap">
      <textarea class="ti-sentence" id="ti-sent" rows="3"
        placeholder="在這裡寫一句話…"
        autocomplete="off" autocorrect="off" spellcheck="false"
      ></textarea>
    </div>
    <div id="fb" style="margin-top:12px;"></div>
  </div>`;
  f.innerHTML=`<button class="btn btn-lg btn-primary" onclick="submitSentenceInput()">確認答案 ✓</button>`;
  setTimeout(()=>{const el=document.getElementById('ti-sent');if(el)el.focus()},200);
}
 
function submitSentenceInput(){
  if(S.answered)return;
  const q=S.questions[S.qi];
  const val=(document.getElementById('ti-sent').value||'').trim();
  if(!val){alert('請先輸入一句話喔！');return;}
  S.answered=true;
  const ta=document.getElementById('ti-sent');
  UP[S.unit].hwDone=(UP[S.unit].hwDone||0)+1;
 
  if(q.answer===null){
    // 開放式：包含關鍵詞就算對
    const kw=q.kp_id==='kp_l01_007'?'高興':null;
    const ok=!kw||val.includes(kw);
    if(ok)S.correct++;
    ta.classList.add(ok?'correct':'wrong');
    ta.disabled=true;
    if(ok){
      document.getElementById('fb').innerHTML=`<div class="feedback ok"><div class="fb-icon">🎉</div><div class="fb-title">寫得很棒！</div><div class="fb-text">你的句子：「${val}」<br>${q.explanation}</div></div>`;
    } else {
      document.getElementById('fb').innerHTML=`<div class="feedback no"><div class="fb-icon">🤔</div><div class="fb-title">記得加入「高興」喔！</div><div class="fb-text">${q.explanation}</div></div>`;
    }
  } else {
    const ok=val===q.answer;
    if(ok)S.correct++;
    ta.classList.add(ok?'correct':'wrong');
    ta.disabled=true;
    fb(ok,q.answer,q.explanation,'fb');
  }
  document.getElementById('q-footer').innerHTML=`<button class="btn btn-lg btn-primary" onclick="nextQ()">下一題 →</button>`;
}
 
// ════════════════════════════════════════════════════════
// Choice (single_choice, word_building, fill_blank, sentence_choice, sentence_pattern_fill)
// ════════════════════════════════════════════════════════
function renderChoice(q,c,f){
  const letters=['Ａ','Ｂ','Ｃ','Ｄ'];
  const hint=(q.question_type==='fill_blank'||q.question_type==='sentence_pattern_fill')?'<div class="q-hint">選出正確的詞語填入空格</div>':'';
  c.innerHTML=`<div class="question-body"><div class="q-stem">${q.stem}</div>${hint}<div class="options-grid">
    ${q.options.map((o,i)=>`<button class="option-btn" id="opt-${i}" onclick="selOpt(${i})"><span class="opt-letter">${letters[i]}</span>${o}</button>`).join('')}
  </div><div id="fb"></div></div>`;
  f.innerHTML=`<button class="btn btn-lg btn-primary btn-disabled" id="btn-next" onclick="nextQ()">下一題 →</button>`;
}
function selOpt(idx){
  if(S.answered)return;S.answered=true;
  const q=S.questions[S.qi],ok=q.options[idx]===q.answer;
  if(ok)S.correct++;
  document.querySelectorAll('.option-btn').forEach((btn,i)=>{
    if(q.options[i]===q.answer)btn.classList.add('correct');
    else if(i===idx&&!ok)btn.classList.add('wrong');
  });
  fb(ok,q.answer,q.explanation,'fb');
  document.getElementById('btn-next').classList.remove('btn-disabled');
}
 
// ════════════════════════════════════════════════════════
// Dual Fill
// ════════════════════════════════════════════════════════
function renderDual(q,c,f){
  const letters=['Ａ','Ｂ','Ｃ','Ｄ'];
  c.innerHTML=`<div class="question-body">
    <div class="q-stem" style="margin-bottom:14px;">雙格填空，一次填一格 🙂</div>
    <div class="dual-section"><div class="dual-label">第一格：小青蛙跳出（　　）</div><div id="s0r" style="min-height:34px;margin-bottom:4px;"></div></div>
    <div class="dual-section"><div class="dual-label">第二格：一眼就看見（　　）的天空</div><div id="s1r" style="min-height:34px;margin-bottom:8px;"></div></div>
    <div id="dp" style="font-size:14px;font-weight:800;color:var(--coral);margin-bottom:8px;">先選第一格的答案 👇</div>
    ${q.options.map((o,i)=>`<button class="dual-opt" id="dopt-${i}" onclick="selDual(${i})"><span class="dual-opt-letter">${letters[i]}</span>${o}</button>`).join('')}
    <div id="fb" style="margin-top:10px;"></div>
  </div>`;
  f.innerHTML=`<button class="btn btn-lg btn-primary btn-disabled" id="btn-next" onclick="nextQ()">下一題 →</button>`;
}
function selDual(idx){
  if(S.answered)return;
  const q=S.questions[S.qi],slot=S.dslot,val=q.options[idx],ok=val===q.answer[slot];
  S.dchosen[slot]=val;
  document.getElementById('s'+slot+'r').innerHTML=`<span style="display:inline-block;font-size:16px;font-weight:800;padding:5px 14px;border-radius:10px;background:${ok?'#EDFBF0':'#FFF0F0'};color:${ok?'#2e7d32':'#c94040'};border:2px solid ${ok?'var(--grass)':'var(--coral)'}">${val} ${ok?'✓':'✗'}</span>`;
  if(slot===0){S.dslot=1;document.getElementById('dp').textContent='再選第二格的答案 👇';}
  else{
    S.answered=true;
    const allOk=S.dchosen[0]===q.answer[0]&&S.dchosen[1]===q.answer[1];
    if(allOk)S.correct++;
    document.getElementById('dp').style.display='none';
    fb(allOk,q.answer.join('＋'),q.explanation,'fb');
    document.getElementById('btn-next').classList.remove('btn-disabled');
  }
}
 
// ════════════════════════════════════════════════════════
// Sentence Reorder
// ════════════════════════════════════════════════════════
function renderReorder(q,c,f){
  c.innerHTML=`<div class="question-body"><div class="q-stem">${q.stem}</div><div class="q-hint">點詞語來排列句子 👇</div>
    <div class="answer-area" id="aa"><span style="color:#CCC;font-size:14px;font-weight:600">點詞語來組句子</span></div>
    <div class="chip-pool" id="cp">${q.options.map((o,i)=>`<button class="chip chip-src" id="chip-${i}" onclick="addChip(${i},'${esc(o)}')">${o}</button>`).join('')}</div>
    <div id="fb"></div></div>`;
  f.innerHTML=`<button class="btn btn-lg btn-primary" onclick="submitReorder()">確認答案 ✓</button><button class="btn btn-sm btn-ghost" onclick="clearReorder()">清除重排</button>`;
}
function addChip(idx,val){
  const el=document.getElementById('chip-'+idx);if(el.classList.contains('used'))return;
  el.classList.add('used');S.built.push({idx,val});refreshAA();
}
function refreshAA(){
  const aa=document.getElementById('aa');if(!aa)return;
  if(!S.built.length){aa.innerHTML='<span style="color:#CCC;font-size:14px;font-weight:600">點詞語來組句子</span>';return;}
  aa.innerHTML='';
  S.built.forEach((item,i)=>{
    const btn=document.createElement('button');btn.className='chip chip-sel';btn.textContent=item.val;
    btn.onclick=()=>{document.getElementById('chip-'+item.idx).classList.remove('used');S.built.splice(i,1);refreshAA();};
    aa.appendChild(btn);
  });
}
function clearReorder(){S.built.forEach(item=>{const e=document.getElementById('chip-'+item.idx);if(e)e.classList.remove('used')});S.built=[];refreshAA();}
function submitReorder(){
  if(S.answered)return;
  const q=S.questions[S.qi],built=S.built.map(i=>i.val).join('');
  if(!built){alert('請先排列詞語喔！');return;}
  S.answered=true;const ok=built===q.answer;if(ok)S.correct++;
  fb(ok,q.answer,q.explanation,'fb');
  document.getElementById('q-footer').innerHTML=`<button class="btn btn-lg btn-primary" onclick="nextQ()">下一題 →</button>`;
}
 
// ════════════════════════════════════════════════════════
// Feedback
// ════════════════════════════════════════════════════════
function fb(ok,answer,explanation,elId){
  const el=document.getElementById(elId);if(!el)return;
  el.innerHTML=ok
    ?`<div class="feedback ok"><div class="fb-icon">🎉</div><div class="fb-title">答對了！</div><div class="fb-text">${explanation}</div></div>`
    :`<div class="feedback no"><div class="fb-icon">🤔</div><div class="fb-title">再想想…</div><div class="fb-text">正確答案是「${Array.isArray(answer)?answer.join('＋'):answer}」<br>${explanation}</div></div>`;
}
 
// ════════════════════════════════════════════════════════
// NEXT / END
// ════════════════════════════════════════════════════════
function nextQ(){S.qi++;if(S.qi>=S.questions.length)endMode();else renderQ();}
function endMode(){
  const p=UP[S.unit];p[S.mode]=true;
  if(S.mode==='challenge'){
    const e=calcStars(S.correct,S.questions.length);p.starsEarned=e;S.stars+=e;syncStars();showResult();
  }else if(S.mode==='reinforcement'){S.stars+=3;syncStars();showClear();}
  else{S.stars+=5;syncStars();showExploreDone();}
}
function calcStars(c,t){const r=c/t;return r===1?5:r>=.8?4:r>=.6?3:r>=.4?2:1;}
 
function showResult(){
  const t=S.questions.length,c=S.correct,r=c/t,p=UP[S.unit];
  const[em,ti]=r===1?['🤩','全對！你是小天才！']:r>=.6?['🎉','做得很好！']:['😊','繼續加油！'];
  document.getElementById('r-emoji').textContent=em;
  document.getElementById('r-title').textContent=ti;
  document.getElementById('r-sub').textContent=`完成挑戰關！答對 ${c}/${t} 題`;
  document.getElementById('r-correct').textContent=c;
  document.getElementById('r-total').textContent=t;
  document.getElementById('r-stars').textContent=`+${p.starsEarned}⭐`;
  let sh='';for(let i=0;i<5;i++)sh+=`<span class="star-e" style="${i>=p.starsEarned?'opacity:.2':''}">⭐</span>`;
  document.getElementById('r-stars-row').innerHTML=sh;
  document.getElementById('r-msg').textContent=r===1?'完美！繼續去補強關吧！':r>=.6?'不錯喔！去補強關再練看看！':'沒關係！補強關多練習就會了！';
  S.history=[];goTo('screen-result');
}
function startReinforce(){startMode('reinforcement')}
function showClear(){S.history=[];goTo('screen-clear')}
function startExplore(){startMode('exploration')}
function showExploreDone(){
  const unit=DB.units.find(u=>u.unit_id===S.unit);
  document.getElementById('q-render').innerHTML=`<div class="question-body" style="text-align:center;padding:40px 24px;">
    <div style="font-size:70px;margin-bottom:14px;">🌟</div>
    <div style="font-size:24px;font-weight:900;margin-bottom:10px;">探索完成！</div>
    <div style="font-size:15px;color:var(--muted);font-weight:600;line-height:1.8;">你完成了《${unit.unit_title}》全部三關！<br>獲得 ＋5⭐ 星星！<br><br><span style="font-size:26px;">🎊 🎉 ✨</span></div></div>`;
  document.getElementById('q-footer').innerHTML=`<button class="btn btn-lg btn-purple" onclick="goTo('screen-units')">🏠 回到單元列表</button><button class="btn btn-lg btn-ghost" onclick="goTo('screen-progress')">📊 看我的進度</button>`;
}
 
// ════════════════════════════════════════════════════════
// PROGRESS
// ════════════════════════════════════════════════════════
function renderProgress(){
  const all=Object.values(UP);
  document.getElementById('a-ch').textContent=all.filter(p=>p.challenge).length;
  document.getElementById('a-re').textContent=all.filter(p=>p.reinforcement).length;
  document.getElementById('a-ex').textContent=all.filter(p=>p.exploration).length;
  document.getElementById('a-hw').textContent=all.reduce((s,p)=>s+(p.hwDone||0),0);
  const c=document.getElementById('p-units');c.innerHTML='';
  DB.units.filter(u=>u.subject==='chinese').forEach((unit,idx)=>{
    const p=UP[unit.unit_id]||{};
    const color=['#FF6B6B','#6ECFF0','#6BCB77'][idx%3];
    const modes=[{k:'challenge',l:'挑戰',cl:'ml-ch',col:'var(--coral)'},{k:'reinforcement',l:'補強',cl:'ml-re',col:'var(--peach)'},{k:'exploration',l:'探索',cl:'ml-ex',col:'var(--lavender)'}];
    const mh=modes.map(m=>`<div class="mp-row"><span class="mp-label ${m.cl}">${m.l}</span><div class="progress-wrap" style="flex:1;height:10px;margin:0"><div class="progress-bar" style="width:${p[m.k]?100:0}%;background:${m.col}"></div></div><span class="mp-pct">${p[m.k]?100:0}%</span></div>`).join('');
    c.innerHTML+=`<div class="upc"><div class="upc-hd"><div class="upc-num" style="background:${color}">${unit.lesson_order}</div><div style="flex:1"><div class="upc-title">${unit.unit_title}</div><div class="upc-sub">${unit.version} ．${unit.semester}</div></div><div style="font-weight:900;color:var(--sun);font-size:18px">${p.starsEarned?'⭐'.repeat(p.starsEarned):'—'}</div></div>${mh}</div>`;
  });
}
 
function esc(s){return(s||'').replace(/'/g,"\\'")}
syncStars();
</script>
</body>
