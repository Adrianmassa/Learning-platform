<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學學星球 ✨ 春天的顏色</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
:root {
  --sky:#6ECFF0;--sun:#FFD93D;--grass:#6BCB77;--coral:#FF6B6B;
  --lavender:#C3A6FF;--peach:#FFB347;
  --bg:#FFF9F0;--card:#FFFFFF;--text:#2D2D2D;--muted:#8A8A8A;
  --shadow:0 8px 32px rgba(0,0,0,.10);--shadow-sm:0 4px 16px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito','Noto Sans TC',sans-serif;background:var(--bg);min-height:100vh;color:var(--text);overflow-x:hidden}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:#fff;box-shadow:0 2px 12px rgba(0,0,0,.06);position:sticky;top:0;z-index:100}
.btn-back{width:42px;height:42px;border-radius:50%;border:none;background:#F0F0F0;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .12s}
.btn-back:active{transform:scale(.88)}
.topbar-title{font-size:16px;font-weight:800}
.stars-chip{display:flex;align-items:center;gap:4px;background:var(--sun);padding:5px 13px;border-radius:18px;font-weight:800;font-size:14px}
.content{flex:1;overflow-y:auto;padding:16px}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;font-family:inherit;font-weight:800;border-radius:20px;transition:transform .12s,box-shadow .12s;user-select:none}
.btn:active{transform:translateY(4px) scale(.97)}
.btn-lg{width:100%;padding:18px;font-size:19px;border-radius:22px}
.btn-sm{padding:9px 18px;font-size:13px;border-radius:13px}
.btn-primary{background:var(--coral);color:#fff;box-shadow:0 6px 0 #c94040}
.btn-primary:active{box-shadow:0 2px 0 #c94040}
.btn-green{background:var(--grass);color:#fff;box-shadow:0 6px 0 #4aaa58}
.btn-green:active{box-shadow:0 2px 0 #4aaa58}
.btn-yellow{background:var(--sun);color:#333;box-shadow:0 6px 0 #e0b800}
.btn-yellow:active{box-shadow:0 2px 0 #e0b800}
.btn-purple{background:var(--lavender);color:#fff;box-shadow:0 6px 0 #9c78e0}
.btn-purple:active{box-shadow:0 2px 0 #9c78e0}
.btn-ghost{background:#F0F0F0;color:var(--text);box-shadow:0 4px 0 #D0D0D0}
.btn-ghost:active{box-shadow:0 2px 0 #D0D0D0}
.btn-off{background:#E0E0E0!important;color:#AAA!important;box-shadow:none!important;cursor:not-allowed;pointer-events:none}
.prog-wrap{background:#F0F0F0;border-radius:12px;height:13px;overflow:hidden;margin:7px 0}
.prog-bar{height:100%;border-radius:12px;background:linear-gradient(90deg,var(--grass),var(--sky));transition:width .5s ease}
.q-dots{display:flex;gap:5px}
.q-dot{width:9px;height:9px;border-radius:50%;background:#E0E0E0;transition:background .3s}
.q-dot.done{background:var(--grass)}
.q-dot.current{background:var(--coral);transform:scale(1.3)}
/* HOME */
#screen-home{background:linear-gradient(170deg,#E8F7FF 0%,#FFF9F0 60%)}
.home-hero{padding:28px 20px 8px;text-align:center}
.planet{font-size:76px;animation:float 3s ease-in-out infinite;display:block;margin:0 auto 8px}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-11px)}}
.home-title{font-size:30px;font-weight:900}
.home-sub{font-size:15px;color:var(--muted);margin-top:5px;font-weight:600}
.home-star-badge{display:inline-flex;align-items:center;gap:5px;background:var(--sun);padding:7px 18px;border-radius:18px;font-weight:900;font-size:17px;margin:14px auto 0}
.home-menu{padding:18px;display:flex;flex-direction:column;gap:13px}
.home-card{border-radius:22px;padding:20px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;border:none;font-family:inherit;font-weight:800;font-size:18px;color:#fff;text-align:left;width:100%}
.home-card:active{transform:translateY(5px) scale(.98)}
.home-card .hci{font-size:36px;flex-shrink:0}
.hc-sub{font-size:13px;font-weight:600;opacity:.85;margin-top:2px}
.hc1{background:linear-gradient(135deg,#FF6B6B,#FF8E53);box-shadow:0 8px 0 #c94040}
.hc1:active{box-shadow:0 3px 0 #c94040}
.hc2{background:linear-gradient(135deg,#6ECFF0,#43A8D0);box-shadow:0 8px 0 #3088b0}
.hc2:active{box-shadow:0 3px 0 #3088b0}
.hc3{background:linear-gradient(135deg,#C3A6FF,#9B6FEF);box-shadow:0 8px 0 #7a4fd0}
.hc3:active{box-shadow:0 3px 0 #7a4fd0}
/* SUBJECT */
.subj-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.subj-card{border-radius:22px;padding:22px 14px;text-align:center;cursor:pointer;border:none;font-family:inherit;transition:transform .15s;box-shadow:var(--shadow)}
.subj-card:active{transform:scale(.95)}
.subj-card .sc-icon{font-size:48px;display:block;margin-bottom:8px}
.sc-name{font-size:19px;font-weight:900;color:#fff}
.sc-pub{font-size:12px;font-weight:600;color:rgba(255,255,255,.8);margin-top:3px}
.sc-chinese{background:linear-gradient(135deg,#FF6B6B,#FF9A9A);box-shadow:0 8px 0 #c94040}
.sc-locked{background:linear-gradient(135deg,#CCC,#AAA);box-shadow:0 8px 0 #888;cursor:not-allowed}
.lock-chip{display:inline-block;background:rgba(0,0,0,.15);color:#fff;font-size:11px;font-weight:700;padding:3px 9px;border-radius:9px;margin-top:5px}
/* UNIT LIST */
.unit-card{border-radius:18px;padding:16px 18px;margin-bottom:12px;cursor:pointer;border:none;font-family:inherit;text-align:left;width:100%;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-sm);transition:transform .15s;background:#fff;border-left:6px solid transparent}
.unit-card:active{transform:scale(.98)}
.uc-active{border-left-color:var(--coral)}
.uc-done{border-left-color:var(--grass)}
.uc-locked{opacity:.5;cursor:not-allowed}
.unit-num{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;font-weight:900;color:#fff;flex-shrink:0}
.un-active{background:var(--coral)}.un-done{background:var(--grass)}.un-locked{background:#CCC}
.unit-info{flex:1}
.unit-title{font-size:16px;font-weight:800}
.unit-sub{font-size:12px;color:var(--muted);margin-top:3px}
.unit-badges{display:flex;gap:5px;margin-top:7px;flex-wrap:wrap}
.badge{padding:3px 9px;border-radius:9px;font-size:11px;font-weight:700}
.badge-done{background:#D4F5DB;color:#2e7d32}
.badge-todo{background:#FFE8D6;color:#e65100}
.badge-locked{background:#EEE;color:#888}
/* QE HEADER */
.qe-header{padding:12px 16px 0}
.mode-chip{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:11px;font-size:12px;font-weight:700;color:#fff;margin-bottom:9px}
.mc-challenge{background:var(--coral)}.mc-reinforce{background:var(--peach);color:#333}.mc-explore{background:var(--lavender)}
.q-counter-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.q-counter-text{font-weight:800;font-size:13px;color:var(--muted)}
/* PHASE BANNER */
.phase-banner{margin:0 0 13px;border-radius:16px;padding:13px 16px;display:flex;align-items:center;gap:11px}
.ph-icon{font-size:30px;flex-shrink:0}
.ph-title{font-size:15px;font-weight:900}
.ph-sub{font-size:11px;font-weight:600;opacity:.8;margin-top:2px}
.ph-recognition{background:linear-gradient(135deg,#FFF8E1,#FFF3CD);border:2px solid #FFD93D}
.ph-comprehension{background:linear-gradient(135deg,#E8F5E9,#C8E6C9);border:2px solid #6BCB77}
.ph-operation{background:linear-gradient(135deg,#E3F2FD,#BBDEFB);border:2px solid #6ECFF0}
.ph-handwrite{background:linear-gradient(135deg,#FCE4EC,#F8BBD9);border:2px solid #FF6B6B}
/* QTYPE BADGE */
.qtype-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:10px;font-size:11px;font-weight:700;margin-bottom:10px}
.qt-recognition{background:#FFF3CD;color:#856404}
.qt-comprehension{background:#D1F2EB;color:#0e6655}
.qt-operation{background:#D6EAF8;color:#1a5276}
.qt-handwrite{background:#FCE4EC;color:#880e4f}
/* QUESTION BODY */
.qbody{background:#fff;border-radius:22px;padding:22px 18px;margin-bottom:12px;box-shadow:var(--shadow-sm)}
.q-stem{font-size:20px;font-weight:800;line-height:1.7;color:var(--text);margin-bottom:14px}
.q-hint{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:11px}
/* OPTIONS */
.opts-col{display:flex;flex-direction:column;gap:10px}
.opt-btn{border:3px solid #E8E8E8;background:#fff;border-radius:16px;padding:14px 16px;font-family:inherit;font-size:17px;font-weight:700;color:var(--text);cursor:pointer;text-align:left;display:flex;align-items:center;gap:11px;transition:border-color .15s,background .15s}
.opt-btn:active{transform:scale(.98)}
.opt-btn.selected{border-color:var(--sky);background:#EDF7FF}
.opt-btn.correct{border-color:var(--grass);background:#EDFBF0}
.opt-btn.wrong{border-color:var(--coral);background:#FFF0F0}
.opt-letter{width:32px;height:32px;border-radius:50%;background:#F0F0F0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;flex-shrink:0;transition:background .15s}
.selected .opt-letter{background:var(--sky);color:#fff}
.correct .opt-letter{background:var(--grass);color:#fff}
.wrong .opt-letter{background:var(--coral);color:#fff}
/* WORD BUILDING */
.wb-target{display:flex;gap:10px;justify-content:center;margin:12px 0;flex-wrap:wrap}
.wb-slot{min-width:58px;height:58px;border:3px dashed #D0D0D0;border-radius:14px;background:#FAFAFA;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:900;padding:0 6px;transition:border-color .2s,background .2s}
.wb-slot.filled{border-color:var(--sky);background:#EDF7FF}
.wb-slot.correct{border-color:var(--grass);background:#EDFBF0}
.wb-slot.wrong{border-color:var(--coral);background:#FFF0F0}
.wb-pool{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0}
.wb-chip{padding:12px 18px;border-radius:14px;background:#EEE;font-size:20px;font-weight:800;cursor:pointer;border:none;font-family:inherit;transition:opacity .15s,transform .1s}
.wb-chip:active{transform:scale(.92)}
.wb-chip.used{opacity:.2;pointer-events:none}
/* SENTENCE REORDER */
.sr-pool{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
.sr-chip{padding:10px 15px;border-radius:13px;background:#EEE;font-size:16px;font-weight:700;cursor:pointer;border:none;font-family:inherit;transition:opacity .12s,transform .1s;white-space:nowrap}
.sr-chip:active{transform:scale(.92)}
.sr-chip.used{opacity:.18;pointer-events:none}
.sr-answer{min-height:50px;border:3px dashed #D0D0D0;border-radius:16px;padding:9px 12px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;background:#FAFAFA;margin:10px 0}
.sr-placed{padding:10px 15px;border-radius:13px;background:var(--sky);color:#fff;font-size:16px;font-weight:700;cursor:pointer;border:none;font-family:inherit}
.sr-placed:active{transform:scale(.92)}
/* SENTENCE PATTERN FILL */
.spf-sent{font-size:18px;font-weight:800;line-height:2.6;display:flex;flex-wrap:wrap;align-items:center;gap:3px;margin:10px 0}
.spf-slot{min-width:68px;height:42px;border:3px dashed #D0D0D0;border-radius:12px;background:#FAFAFA;display:inline-flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;padding:0 8px;cursor:pointer;transition:border-color .2s,background .2s;color:#BBB}
.spf-slot.filled{border-color:var(--sky);background:#EDF7FF;color:var(--text)}
.spf-slot.correct{border-color:var(--grass);background:#EDFBF0;color:var(--text)}
.spf-slot.wrong{border-color:var(--coral);background:#FFF0F0;color:var(--text)}
.spf-pool{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
/* HANDWRITE */
.hw-panel{background:linear-gradient(135deg,#FFF9E0,#FFFDF5);border:3px dashed var(--sun);border-radius:20px;padding:20px;text-align:center}
.hw-icon{font-size:46px;margin-bottom:8px}
.hw-title{font-size:18px;font-weight:900;margin-bottom:5px}
.hw-desc{font-size:13px;color:var(--muted);font-weight:600;line-height:1.8}
.hw-chars{display:flex;justify-content:center;gap:12px;margin:15px 0;flex-wrap:wrap}
.hw-grid{display:flex;flex-direction:column;align-items:center}
.hw-box{width:64px;height:64px;border:3px solid var(--sun);border-radius:13px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:900;box-shadow:0 3px 10px rgba(255,217,61,.18)}
.hw-lbl{font-size:10px;color:#BBB;font-weight:600;margin-top:3px}
.hw-level-badge{display:inline-block;padding:4px 12px;border-radius:10px;font-size:12px;font-weight:700;margin:8px 0}
.hwl1{background:#FFF3CD;color:#856404}
.hwl2{background:#FCE4EC;color:#880e4f}
.hwl3{background:#EDE7F6;color:#4a148c}
.guided-tpl{margin:14px 0;padding:14px 16px;background:#fff;border-radius:14px;border:2px solid var(--sun);font-size:18px;font-weight:800;color:#555;line-height:2.4;text-align:center}
.hw-note{font-size:11px;color:#CCC;font-weight:600;margin-top:8px}
/* FEEDBACK */
.fb{border-radius:17px;padding:15px;margin-top:10px}
.fb.correct{background:#EDFBF0;border:2px solid var(--grass)}
.fb.wrong{background:#FFF0F0;border:2px solid var(--coral)}
.fb.neutral{background:#F0F0FF;border:2px solid var(--lavender)}
.fb-icon{font-size:28px;margin-bottom:3px}
.fb-title{font-size:16px;font-weight:900}
.fb-text{font-size:13px;color:#555;margin-top:4px;font-weight:600;line-height:1.7}
.q-footer{padding:0 16px 22px;display:flex;flex-direction:column;gap:10px}
/* RESULT */
#screen-result{background:linear-gradient(160deg,#FFF0E0,#FFF9F0)}
.result-hero{text-align:center;padding:28px 20px 12px}
.r-emoji{font-size:82px;animation:pop .5s ease-out}
@keyframes pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
.r-title{font-size:26px;font-weight:900;margin-top:8px}
.r-sub{font-size:14px;color:var(--muted);font-weight:600;margin-top:4px}
.score-card{background:#fff;border-radius:24px;padding:20px;margin:0 16px;box-shadow:var(--shadow);display:flex;justify-content:space-around;align-items:center}
.score-item{text-align:center}
.score-num{font-size:38px;font-weight:900}
.score-label{font-size:12px;color:var(--muted);font-weight:600;margin-top:3px}
.score-div{width:2px;height:50px;background:#EEE}
.stars-row{display:flex;justify-content:center;gap:7px;margin:15px 0}
.star-a{font-size:36px;animation:starPop .4s ease-out both}
@keyframes starPop{0%{transform:scale(0) rotate(-30deg)}70%{transform:scale(1.2) rotate(10deg)}100%{transform:scale(1) rotate(0)}}
.star-a:nth-child(2){animation-delay:.12s}.star-a:nth-child(3){animation-delay:.24s}
.star-a:nth-child(4){animation-delay:.36s}.star-a:nth-child(5){animation-delay:.48s}
.r-msg{text-align:center;font-size:16px;font-weight:700;margin:0 16px 14px;padding:12px;background:#fff;border-radius:14px;box-shadow:var(--shadow-sm)}
.phase-sum{margin:0 16px 14px;background:#fff;border-radius:18px;padding:14px;box-shadow:var(--shadow-sm)}
.ps-title{font-size:13px;font-weight:800;color:var(--muted);margin-bottom:9px}
.ps-row{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.ps-icon{font-size:18px;width:26px;text-align:center}
.ps-label{font-size:13px;font-weight:700;flex:1}
.ps-count{font-size:12px;font-weight:800;color:var(--muted)}
/* CLEAR */
#screen-clear{background:linear-gradient(160deg,#E8F7FF,#FFF9F0);text-align:center}
.clear-trophy{font-size:90px;margin:30px 0 6px;animation:spin .8s ease-out}
@keyframes spin{0%{transform:rotate(-20deg) scale(0);opacity:0}60%{transform:rotate(10deg) scale(1.15)}100%{transform:rotate(0) scale(1);opacity:1}}
.clear-title{font-size:30px;font-weight:900}
.clear-sub{font-size:14px;color:var(--muted);font-weight:600;margin:7px 18px 0;line-height:1.7}
.celebrate{display:flex;justify-content:center;gap:7px;font-size:22px;margin:10px 0}
.unlock-card{margin:18px;background:linear-gradient(135deg,#C3A6FF,#9B6FEF);border-radius:22px;padding:20px;color:#fff;box-shadow:0 8px 0 #7a4fd0}
.unlock-icon{font-size:44px;margin-bottom:7px}
.unlock-title{font-size:20px;font-weight:900}
.unlock-sub{font-size:13px;opacity:.85;font-weight:600;margin-top:4px}
/* PROGRESS */
.prog-hero{background:linear-gradient(135deg,var(--lavender),#9B6FEF);border-radius:22px;padding:20px;color:#fff;margin-bottom:16px;text-align:center}
.prog-hero-stars{font-size:42px;font-weight:900}
.prog-hero-label{font-size:14px;opacity:.85;font-weight:600;margin-top:3px}
.ach-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:16px}
.ach-card{background:#fff;border-radius:17px;padding:14px;text-align:center;box-shadow:var(--shadow-sm)}
.ach-icon{font-size:32px;margin-bottom:5px}
.ach-val{font-size:21px;font-weight:900}
.ach-label{font-size:11px;font-weight:700;color:var(--muted)}
.upc{background:#fff;border-radius:18px;padding:16px;margin-bottom:11px;box-shadow:var(--shadow-sm)}
.upc-top{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.upc-num{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;color:#fff;flex-shrink:0}
.upc-title{font-size:15px;font-weight:800}
.upc-sub{font-size:11px;color:var(--muted);font-weight:600;margin-top:2px}
.mpr{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.mpl{width:44px;font-size:10px;font-weight:700;padding:3px 5px;border-radius:7px;text-align:center;flex-shrink:0}
.mpl-c{background:#FFE8E8;color:#c94040}.mpl-r{background:#FFF0D6;color:#e65100}.mpl-e{background:#EEE8FF;color:#7a4fd0}
.mp-pct{font-size:11px;font-weight:700;color:var(--muted);width:34px;text-align:right}
.sec-title{font-size:14px;font-weight:800;color:var(--muted);margin-bottom:11px}
.spacer{height:14px}
</style>
</head>
<body>
 
<!-- HOME -->
<div id="screen-home" class="screen active">
  <div class="home-hero">
    <span class="planet">🌏</span>
    <div class="home-title">學學星球</div>
    <div class="home-sub">國小二年級 ✨ 下學期</div>
    <div class="home-star-badge">⭐ <span id="home-stars">0</span> 顆星</div>
  </div>
  <div class="home-menu">
    <button class="home-card hc1" onclick="goTo('screen-subject')">
      <span class="hci">🚀</span>
      <div><div>開始單元挑戰</div><div class="hc-sub">選科目，開始學習！</div></div>
    </button>
    <button class="home-card hc2" onclick="goTo('screen-subject')">
      <span class="hci">🔄</span>
      <div><div>再練一次</div><div class="hc-sub">複習做過的題目</div></div>
    </button>
    <button class="home-card hc3" onclick="goTo('screen-progress')">
      <span class="hci">📊</span>
      <div><div>我的進度</div><div class="hc-sub">看看星星和成就</div></div>
    </button>
  </div>
</div>
 
<!-- SUBJECT -->
<div id="screen-subject" class="screen">
  <div class="topbar">
    <button class="btn-back" onclick="goBack()">←</button>
    <span class="topbar-title">選科目</span>
    <div class="stars-chip">⭐ <span class="sd">0</span></div>
  </div>
  <div class="content">
    <div class="spacer"></div>
    <div class="subj-grid">
      <button class="subj-card sc-chinese" onclick="goToUnits('chinese')">
        <span class="sc-icon">📖</span><div class="sc-name">國語</div><div class="sc-pub">康軒版</div>
      </button>
      <button class="subj-card sc-locked" disabled>
        <span class="sc-icon">🔢</span><div class="sc-name">數學</div><div class="sc-pub">翰林版</div>
        <div class="lock-chip">🔒 即將開放</div>
      </button>
      <button class="subj-card sc-locked" disabled>
        <span class="sc-icon">🌍</span><div class="sc-name">生活</div><div class="lock-chip">🔒 即將開放</div>

  document.getElementById('home-stars').textContent=S.stars;
  document.getElementById('prog-total').textContent=S.stars;
  document.querySelectorAll('.sd').forEach(e=>e.textContent=S.stars);
}
function confirmQuit(){if(confirm('要離開這一關嗎？進度不會儲存喔！'))goTo('screen-units');}
 
// ════════════════════════════════════════════════════════
//  SUBJECT / UNITS
// ════════════════════════════════════════════════════════
function goToUnits(subj){
  S.subject=subj;
  document.getElementById('units-title').textContent=subj==='chinese'?'國語單元':'數學單元';
  renderUnits(subj); goTo('screen-units');
}
function renderUnits(subj){
  const el=document.getElementById('units-list');
  const units=DB.units.filter(u=>u.subject===subj);
  el.innerHTML='';
  units.forEach((u,i)=>{
    const p=S.unitProg[u.unit_id]||{};
    const unlocked=i===0||(S.unitProg[units[i-1].unit_id]?.challenge);
    const done=p.challenge&&p.reinforcement;
    const nc=!unlocked?'un-locked':done?'un-done':'un-active';
    const cc=!unlocked?'uc-locked':done?'uc-done':'uc-active';
    const ni=!unlocked?'🔒':done?'✓':u.lesson_order;
    const ms=[{k:'challenge',l:'挑戰關'},{k:'reinforcement',l:'補強關'},{k:'exploration',l:'探索關'}];
    const badges=ms.map(m=>{
      if(!unlocked) return `<span class="badge badge-locked">${m.l} 🔒</span>`;
      if(p[m.k]) return `<span class="badge badge-done">${m.l} ✓</span>`;
      return `<span class="badge badge-todo">${m.l}</span>`;
    }).join('');
    const oc=unlocked?`openUnit('${u.unit_id}')`:`alert('請先完成前一課！')`;
    el.innerHTML+=`<button class="unit-card ${cc}" onclick="${oc}">
      <div class="unit-num ${nc}">${ni}</div>
      <div class="unit-info">
        <div class="unit-title">第${u.lesson_order}課　${u.unit_title}</div>
        <div class="unit-sub">${u.version}．${u.theme.slice(0,20)}…</div>
        <div class="unit-badges">${badges}</div>
      </div></button>`;
  });
}
function openUnit(uid){
  S.unit=uid;
  const p=S.unitProg[uid];
  if(!p.challenge) startMode('challenge');
  else if(!p.reinforcement) startMode('reinforcement');
  else if(!p.exploration) startMode('exploration');
  else{if(confirm('已完成全部三關！要重新挑戰嗎？'))startMode('challenge');}
}
 
// ════════════════════════════════════════════════════════
//  START MODE
// ════════════════════════════════════════════════════════
const MMETA={
  challenge:{chip:'🎯 挑戰關',cls:'mc-challenge',top:'挑戰關'},
  reinforcement:{chip:'💪 補強關',cls:'mc-reinforce',top:'補強關'},
  exploration:{chip:'🔭 探索關',cls:'mc-explore',top:'探索關'}
};
function startMode(mode){
  S.mode=mode;
  S.questions=DB.questions.filter(q=>q.unit_id===S.unit&&q.mode_type===mode);
  S.qIdx=0;S.correct=0;
  const m=MMETA[mode];
  document.getElementById('q-mode-chip').textContent=m.chip;
  document.getElementById('q-mode-chip').className='mode-chip '+m.cls;
  document.getElementById('q-topbar-title').textContent=m.top;
  goTo('screen-question');renderQ();
}
 
// ════════════════════════════════════════════════════════
//  PHASE META
// ════════════════════════════════════════════════════════
const PMETA={
  recognition:{icon:'🔍',title:'基礎辨認',sub:'先認識課文中的字詞！',cls:'ph-recognition',badge:'qt-recognition',label:'辨認'},
  comprehension:{icon:'💡',title:'核心理解',sub:'理解課文的意思！',cls:'ph-comprehension',badge:'qt-comprehension',label:'理解'},
  operation:{icon:'✏️',title:'語文操作',sub:'動手排句子、填句型！',cls:'ph-operation',badge:'qt-operation',label:'操作'},
  handwrite:{icon:'✍️',title:'手寫輸出',sub:'拿起鉛筆，在紙上寫！',cls:'ph-handwrite',badge:'qt-handwrite',label:'手寫'}
};
const QTLABELS={
  single_choice:'選擇',sentence_choice:'句子選擇',fill_blank:'填空',
  word_building:'組詞',sentence_reorder:'排句',sentence_pattern_fill:'句型填空',
  handwrite_character:'寫字',handwrite_word:'寫詞語',handwrite_radical:'寫部首',
  guided_sentence_writing:'引導造句'
};
 
// ════════════════════════════════════════════════════════
//  RENDER QUESTION
// ════════════════════════════════════════════════════════
function renderQ(){
  const q=S.questions[S.qIdx];
  const total=S.questions.length;
  S.answered=false;S.wbBuilt=[];S.srBuilt=[];S.spfFilled={};S._spfSlotChip={};
 
  document.getElementById('q-counter').textContent=`第 ${S.qIdx+1} / ${total} 題`;
  document.getElementById('q-prog').style.width=(S.qIdx/total*100)+'%';
  const dots=document.getElementById('q-dots');
  dots.innerHTML='';
  for(let i=0;i<total;i++){const d=document.createElement('div');d.className='q-dot '+(i<S.qIdx?'done':i===S.qIdx?'current':'');dots.appendChild(d);}
 
  const container=document.getElementById('q-render');
  const footer=document.getElementById('q-footer');
  container.innerHTML='';footer.innerHTML='';
 
  // Phase banner on phase change
  const prevPhase=S.qIdx>0?S.questions[S.qIdx-1].phase:null;
  let pb='';
  if(q.phase&&q.phase!==prevPhase){
    const pm=PMETA[q.phase];
    if(pm) pb=`<div class="phase-banner ${pm.cls}"><div class="ph-icon">${pm.icon}</div><div><div class="ph-title">${pm.title}</div><div class="ph-sub">${pm.sub}</div></div></div>`;
  }
  // qtype badge
  const pm=PMETA[q.phase]||{};
  const qb=`<div class="qtype-badge ${pm.badge||''}">${pm.icon||''} ${pm.label||''} ／ ${QTLABELS[q.question_type]||q.question_type}</div>`;
 
  if(q.response_mode==='handwrite_then_confirm') renderHW(q,container,footer,pb,qb);
  else if(q.question_type==='word_building') renderWB(q,container,footer,pb,qb);
  else if(q.question_type==='sentence_reorder') renderSR(q,container,footer,pb,qb);
  else if(q.question_type==='sentence_pattern_fill') renderSPF(q,container,footer,pb,qb);
  else renderChoice(q,container,footer,pb,qb);
}
 
// ── single_choice / sentence_choice ─────────────────────
function renderChoice(q,c,f,pb,qb){
  const L=['Ａ','Ｂ','Ｃ','Ｄ'];
  const opts=q.options.map((o,i)=>`<button class="opt-btn" id="opt-${i}" onclick="selOpt(${i})"><span class="opt-letter">${L[i]}</span>${o}</button>`).join('');
  c.innerHTML=`${pb}<div class="qbody">${qb}<div class="q-stem">${q.stem}</div><div class="opts-col">${opts}</div><div id="q-fb" style="margin-top:10px"></div></div>`;
  f.innerHTML=`<button class="btn btn-lg btn-primary btn-off" id="btn-next" onclick="nextQ()">下一題 →</button>`;
}
function selOpt(idx){
  if(S.answered) return;
  const q=S.questions[S.qIdx];S.answered=true;
  const ok=q.options[idx]===q.answer;
  if(ok)S.correct++;
  document.querySelectorAll('.opt-btn').forEach((b,i)=>{
    if(q.options[i]===q.answer) b.classList.add('correct');
    else if(i===idx&&!ok) b.classList.add('wrong');
  });
  showFB(ok,q.answer,q.explanation);
  document.getElementById('btn-next').classList.remove('btn-off');
}
 
// ── word_building ────────────────────────────────────────
function renderWB(q,c,f,pb,qb){
  const len=q.answer.length;
  const slots=Array.from({length:len},(_,i)=>`<div class="wb-slot" id="wbs-${i}"></div>`).join('');
  const pool=q.options.map((o,i)=>`<button class="wb-chip" id="wbc-${i}" onclick="wbAdd(${i},'${esc(o)}')">${o}</button>`).join('');
  c.innerHTML=`${pb}<div class="qbody">${qb}<div class="q-stem">${q.stem}</div><div class="q-hint">點字來組詞 👇</div><div class="wb-target">${slots}</div><div class="wb-pool">${pool}</div><div id="q-fb" style="margin-top:10px"></div></div>`;
  f.innerHTML=`<button class="btn btn-lg btn-primary" onclick="submitWB()">確認答案 ✓</button><button class="btn btn-sm btn-ghost" style="margin-top:0" onclick="clearWB()">清除</button>`;
}
function wbAdd(idx,val){
  const q=S.questions[S.qIdx];
  if(S.wbBuilt.length>=q.answer.length) return;
  const el=document.getElementById('wbc-'+idx);
  if(!el||el.classList.contains('used')) return;
  el.classList.add('used');
  S.wbBuilt.push({idx,val});
  S.wbBuilt.forEach((item,i)=>{
    const s=document.getElementById('wbs-'+i);
    if(s){s.textContent=item.val;s.classList.add('filled');}
  });
}
function clearWB(){
  const q=S.questions[S.qIdx];
  S.wbBuilt.forEach(item=>{const e=document.getElementById('wbc-'+item.idx);if(e)e.classList.remove('used');});
  S.wbBuilt=[];
  for(let i=0;i<q.answer.length;i++){const s=document.getElementById('wbs-'+i);if(s){s.textContent='';s.className='wb-slot';}}
}
function submitWB(){
  if(S.answered) return;
  const q=S.questions[S.qIdx];
  const built=S.wbBuilt.map(i=>i.val).join('');
  if(!built){alert('請先點選文字！');return;}
  S.answered=true;
  const ok=built===q.answer;
  if(ok)S.correct++;
  for(let i=0;i<q.answer.length;i++){const s=document.getElementById('wbs-'+i);if(s)s.classList.add(ok?'correct':'wrong');}
  showFB(ok,q.answer,q.explanation);
  document.getElementById('q-footer').innerHTML=`<button class="btn btn-lg btn-primary" onclick="nextQ()">下一題 →</button>`;
}
 
// ── sentence_reorder ─────────────────────────────────────
function renderSR(q,c,f,pb,qb){
  const pool=q.options.map((o,i)=>`<button class="sr-chip" id="src-${i}" onclick="srAdd(${i},'${esc(o)}')">${o}</button>`).join('');
  c.innerHTML=`${pb}<div class="qbody">${qb}<div class="q-stem">${q.stem}</div><div class="q-hint">按順序點詞卡排句子 👇</div><div class="sr-answer" id="sr-ans"><span style="color:#CCC;font-size:13px;font-weight:600">點詞卡來排句子</span></div><div class="sr-pool">${pool}</div><div id="q-fb" style="margin-top:10px"></div></div>`;
  f.innerHTML=`<button class="btn btn-lg btn-primary" onclick="submitSR()">確認答案 ✓</button><button class="btn btn-sm btn-ghost" style="margin-top:0" onclick="clearSR()">清除重排</button>`;
}
function srAdd(idx,val){
  const el=document.getElementById('src-'+idx);
  if(!el||el.classList.contains('used')) return;
  el.classList.add('used');
  S.srBuilt.push({idx,val});
  refreshSR();
}
function refreshSR(){
  const area=document.getElementById('sr-ans');
  if(!area) return;
  if(!S.srBuilt.length){area.innerHTML='<span style="color:#CCC;font-size:13px;font-weight:600">點詞卡來排句子</span>';return;}
  area.innerHTML='';
  S.srBuilt.forEach((item,i)=>{
    const b=document.createElement('button');
    b.className='sr-placed';b.textContent=item.val;
    b.onclick=()=>{const e=document.getElementById('src-'+item.idx);if(e)e.classList.remove('used');S.srBuilt.splice(i,1);refreshSR();};
    area.appendChild(b);
  });
}
function clearSR(){
  S.srBuilt.forEach(item=>{const e=document.getElementById('src-'+item.idx);if(e)e.classList.remove('used');});
  S.srBuilt=[];refreshSR();
}
function submitSR(){
  if(S.answered) return;
  const q=S.questions[S.qIdx];
  const built=S.srBuilt.map(i=>i.val).join('');
  if(!built){alert('請先排列詞卡！');return;}
  S.answered=true;
  const ok=built===q.answer;
  if(ok)S.correct++;
  showFB(ok,q.answer,q.explanation);
  document.getElementById('q-footer').innerHTML=`<button class="btn btn-lg btn-primary" onclick="nextQ()">下一題 →</button>`;
}
 
// ── sentence_pattern_fill ────────────────────────────────
function renderSPF(q,c,f,pb,qb){
  const tpl=q.template;
  let sentHtml='';let last=0;
  const re=/【(.+?)】/g;let m;
  while((m=re.exec(tpl))!==null){
    const before=tpl.slice(last,m.index);
    if(before) sentHtml+=`<span>${before}</span>`;
    const key=m[1];
    sentHtml+=`<div class="spf-slot" id="spf-${esc2(key)}" data-key="${esc(key)}" onclick="spfRemove('${esc(key)}')">？</div>`;
    last=m.index+m[0].length;
  }
  sentHtml+=`<span>${tpl.slice(last)}</span>`;
  const pool=q.options.map((o,i)=>`<button class="sr-chip" id="spfc-${i}" onclick="spfAdd(${i},'${esc(o)}')">${o}</button>`).join('');
  c.innerHTML=`${pb}<div class="qbody">${qb}<div class="q-stem">${q.stem}</div><div class="q-hint">把詞卡放進空格 👇 點空格可取回詞卡</div><div class="spf-sent">${sentHtml}</div><div class="spf-pool">${pool}</div><div id="q-fb" style="margin-top:10px"></div></div>`;
  f.innerHTML=`<button class="btn btn-lg btn-primary" onclick="submitSPF()">確認答案 ✓</button><button class="btn btn-sm btn-ghost" style="margin-top:0" onclick="clearSPF()">清除重填</button>`;
}
function spfAdd(idx,val){
  if(S.answered) return;
  const q=S.questions[S.qIdx];
  const empty=q.slots.find(k=>!S.spfFilled[k]);
  if(!empty) return;
  const el=document.getElementById('spfc-'+idx);
  if(!el||el.classList.contains('used')) return;
  el.classList.add('used');
  S.spfFilled[empty]=val;S._spfSlotChip[empty]=idx;
  const slotEl=document.getElementById('spf-'+esc2(empty));
  if(slotEl){slotEl.textContent=val;slotEl.classList.add('filled');}
}
function spfRemove(key){
  if(S.answered) return;
  if(!S.spfFilled[key]) return;
  const ci=S._spfSlotChip[key];
  const chip=document.getElementById('spfc-'+ci);
  if(chip) chip.classList.remove('used');
  delete S.spfFilled[key];delete S._spfSlotChip[key];
  const slotEl=document.getElementById('spf-'+esc2(key));
  if(slotEl){slotEl.textContent='？';slotEl.classList.remove('filled');}
}
function clearSPF(){
  const q=S.questions[S.qIdx];
  q.slots.forEach(k=>{
    const ci=S._spfSlotChip[k];
    if(ci!==undefined){const e=document.getElementById('spfc-'+ci);if(e)e.classList.remove('used');}
    const se=document.getElementById('spf-'+esc2(k));
    if(se){se.textContent='？';se.className='spf-slot';}
  });
  S.spfFilled={};S._spfSlotChip={};
}
function submitSPF(){
  if(S.answered) return;
  const q=S.questions[S.qIdx];
  if(!q.slots.every(k=>S.spfFilled[k])){alert('請把所有空格都填入詞卡！');return;}
  S.answered=true;
  // exploration = open-ended, any fill is ok
  const ok=q.mode_type==='exploration'||q.slots.every(k=>S.spfFilled[k]===q.answer[k]);
  if(ok)S.correct++;
  q.slots.forEach(k=>{
    const se=document.getElementById('spf-'+esc2(k));
    if(se)se.classList.add(ok?'correct':'wrong');
  });
  const ansStr=q.slots.map(k=>q.answer[k]).join('、');
  showFB(ok,ansStr,q.explanation);
  document.getElementById('q-footer').innerHTML=`<button class="btn btn-lg btn-primary" onclick="nextQ()">下一題 →</button>`;
}
 
// ── handwrite ────────────────────────────────────────────
const HWICONS={handwrite_character:'✍️',handwrite_word:'📝',handwrite_radical:'🖊️',guided_sentence_writing:'📖'};
const HWLVL={1:'Lv.1 基礎',2:'Lv.2 進階',3:'Lv.3 挑戰'};
const HWLCLS={1:'hwl1',2:'hwl2',3:'hwl3'};
function renderHW(q,c,f,pb,qb){
  const icon=HWICONS[q.question_type]||'✍️';
  const lvl=q.handwrite_level;
  const lvlBadge=lvl?`<div class="hw-level-badge ${HWLCLS[lvl]||'hwl1'}">${HWLVL[lvl]}</div>`:'';
  let chars='';
  const isOpen=!q.answer||q.answer.includes('開放')||q.answer.includes('造句');
  if(q.question_type==='guided_sentence_writing'){
    chars=`<div class="guided-tpl">${q.template||''}</div>`;
  } else if(!isOpen){
    chars='<div class="hw-chars">';
    [...q.answer].forEach(ch=>{chars+=`<div class="hw-grid"><div class="hw-box">${ch}</div><div class="hw-lbl">在紙上寫</div></div>`;});
    chars+='</div>';
  }
  c.innerHTML=`${pb}<div class="qbody">${qb}<div class="q-stem">${q.stem}</div>
    <div class="hw-panel">
      <div class="hw-icon">${icon}</div>
      <div class="hw-title">先在紙上${q.expected_output_type==='sentence'?'寫句子':'寫一寫'}！</div>
      ${lvlBadge}
      <div class="hw-desc">拿出鉛筆和格子紙，照著下面的提示寫：</div>
      ${chars}
      <div class="hw-note">寫好了再按下方按鈕 👇</div>
    </div>
    <div id="q-fb" style="margin-top:10px"></div></div>`;
  f.innerHTML=`<button class="btn btn-lg btn-yellow" onclick="confirmHW()">✅ 我寫好了！</button>`;
}
function confirmHW(){
  if(S.answered) return;
  S.answered=true;S.correct++;
  S.unitProg[S.unit].hwDone=(S.unitProg[S.unit].hwDone||0)+1;
  const q=S.questions[S.qIdx];
  document.getElementById('q-fb').innerHTML=`<div class="fb neutral"><div class="fb-icon">✨</div><div class="fb-title">寫完了！超棒！</div><div class="fb-text">${q.explanation}</div></div>`;
  document.getElementById('q-footer').innerHTML=`<button class="btn btn-lg btn-green" onclick="nextQ()">繼續 →</button>`;
}
 
// ── feedback ─────────────────────────────────────────────
function showFB(ok,ans,exp){
  const el=document.getElementById('q-fb');
  if(!el) return;
  el.innerHTML=ok
    ?`<div class="fb correct"><div class="fb-icon">🎉</div><div class="fb-title">答對了！</div><div class="fb-text">${exp}</div></div>`
    :`<div class="fb wrong"><div class="fb-icon">🤔</div><div class="fb-title">再想想…</div><div class="fb-text">正確答案是「${ans}」<br>${exp}</div></div>`;
}
 
// ── next / end ────────────────────────────────────────────
function nextQ(){S.qIdx++;if(S.qIdx>=S.questions.length)endMode();else renderQ();}
function endMode(){
  const p=S.unitProg[S.unit];
  p[S.mode]=true;
  if(S.mode==='challenge'){
    const earned=calcStars(S.correct,S.questions.length);
    p.starsEarned=earned;S.stars+=earned;syncUI();showResult();
  } else if(S.mode==='reinforcement'){
    S.stars+=3;syncUI();showClear();
  } else {
    S.stars+=5;syncUI();showExploreDone();
  }
}
function calcStars(c,t){const p=c/t;return p===1?5:p>=.8?4:p>=.6?3:p>=.4?2:1;}
 
// ── result ────────────────────────────────────────────────
function showResult(){
  const t=S.questions.length,c=S.correct,pct=c/t;
  const stars=S.unitProg[S.unit].starsEarned;
  const [em,ti]=pct===1?['🤩','全對！你是小天才！']:pct>=.6?['🎉','做得很好！']:['😊','繼續加油！'];
  document.getElementById('r-emoji').textContent=em;
  document.getElementById('r-title').textContent=ti;
  document.getElementById('r-sub').textContent=`完成挑戰關！答對 ${c}/${t} 題`;
  document.getElementById('r-correct').textContent=c;
  document.getElementById('r-total').textContent=t;
  document.getElementById('r-stars').textContent='+'+stars+'⭐';
  let sh='';
  for(let i=0;i<5;i++) sh+=`<span class="star-a" style="${i>=stars?'opacity:.2':''}${i>0?';animation-delay:'+(i*.12)+'s':''}">⭐</span>`;
  document.getElementById('r-stars-row').innerHTML=sh;
  document.getElementById('r-msg').textContent=
    pct===1?'完美！繼續去補強關挑戰吧！':pct>=.6?'不錯！去補強關再練練！':'沒關係！補強關多練習就會了！';
  // phase summary
  const phases=['recognition','comprehension','operation','handwrite'];
  const pnames={recognition:'基礎辨認',comprehension:'核心理解',operation:'語文操作',handwrite:'手寫輸出'};
  const picons={recognition:'🔍',comprehension:'💡',operation:'✏️',handwrite:'✍️'};
  let ps='<div class="ps-title">📋 各階段題數</div>';
  phases.forEach(ph=>{
    const qs=S.questions.filter(q=>q.phase===ph);
    if(!qs.length) return;
    ps+=`<div class="ps-row"><div class="ps-icon">${picons[ph]}</div><div class="ps-label">${pnames[ph]}</div><div class="ps-count">${qs.length} 題</div></div>`;
  });
  document.getElementById('r-phase-sum').innerHTML=ps;
  S.history=[];goTo('screen-result');
}
function startReinforce(){startMode('reinforcement');}
function showClear(){S.history=[];goTo('screen-clear');}
function startExplore(){startMode('exploration');}
function showExploreDone(){
  const u=DB.units.find(u=>u.unit_id===S.unit);
  document.getElementById('q-render').innerHTML=`<div class="qbody" style="text-align:center;padding:36px 20px">
    <div style="font-size:66px;margin-bottom:12px">🌟</div>
    <div style="font-size:23px;font-weight:900;margin-bottom:9px">探索完成！</div>
    <div style="font-size:14px;color:var(--muted);font-weight:600;line-height:1.8">
      你完成了《${u.unit_title}》全部三關！<br>獲得 ＋5⭐ 星星！<br><br>
      <span style="font-size:22px">🎊 🎉 ✨</span>
    </div></div>`;
  document.getElementById('q-footer').innerHTML=`
    <button class="btn btn-lg btn-purple" onclick="goTo('screen-units')">🏠 回到單元列表</button>
    <button class="btn btn-lg btn-ghost" onclick="goTo('screen-progress')">📊 看我的進度</button>`;
}
 
// ── progress ──────────────────────────────────────────────
function renderProgress(){
  const all=Object.values(S.unitProg);
  document.getElementById('ach-c').textContent=all.filter(p=>p.challenge).length;
  document.getElementById('ach-r').textContent=all.filter(p=>p.reinforcement).length;
  document.getElementById('ach-e').textContent=all.filter(p=>p.exploration).length;
  document.getElementById('ach-hw').textContent=all.reduce((s,p)=>s+(p.hwDone||0),0);
  const el=document.getElementById('prog-units');el.innerHTML='';
  const colors=['#FF6B6B','#6ECFF0','#6BCB77'];
  DB.units.filter(u=>u.subject==='chinese').forEach((u,i)=>{
    const p=S.unitProg[u.unit_id]||{};const col=colors[i%colors.length];
    const ms=[{k:'challenge',l:'挑戰',cl:'mpl-c',c:'var(--coral)'},{k:'reinforcement',l:'補強',cl:'mpl-r',c:'var(--peach)'},{k:'exploration',l:'探索',cl:'mpl-e',c:'var(--lavender)'}];
    el.innerHTML+=`<div class="upc">
      <div class="upc-top">
        <div class="upc-num" style="background:${col}">${u.lesson_order}</div>
        <div style="flex:1"><div class="upc-title">${u.unit_title}</div><div class="upc-sub">${u.version}．${u.semester}</div></div>
        <div style="font-weight:900;color:var(--sun);font-size:15px">${p.starsEarned?'⭐'.repeat(p.starsEarned):'—'}</div>
      </div>
      ${ms.map(m=>`<div class="mpr"><span class="mpl ${m.cl}">${m.l}</span>
        <div class="prog-wrap" style="flex:1;height:9px;margin:0"><div class="prog-bar" style="width:${p[m.k]?100:0}%;background:${m.c}"></div></div>
        <span class="mp-pct">${p[m.k]?100:0}%</span></div>`).join('')}
    </div>`;
  });
}
 
// ── utils ─────────────────────────────────────────────────
function esc(s){return(s||'').replace(/'/g,"\\'")}
function esc2(s){return(s||'').replace(/[^a-zA-Z0-9\u4e00-\u9fff]/g,'_')}
syncUI();
</script>
